<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HireX Admin</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Cairo,sans-serif}
body{background:#050914;color:#fff;min-height:100vh;overflow-x:hidden}
body:before{content:"";position:fixed;inset:-30%;background:radial-gradient(circle at 80% 5%,rgba(0,198,255,.18),transparent 25%),radial-gradient(circle at 10% 90%,rgba(139,92,246,.18),transparent 25%);z-index:-1}
button,input,select,textarea{font-family:inherit}
.glass{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.25)}
.btn{border:0;border-radius:16px;padding:12px 18px;color:#fff;font-weight:800;cursor:pointer;background:rgba(255,255,255,.08);transition:.2s}
.btn:hover{transform:translateY(-2px)}.p{background:linear-gradient(135deg,#00c6ff,#0072ff)}.ok{background:rgba(34,197,94,.18);color:#86efac}.no{background:rgba(239,68,68,.18);color:#fca5a5}
input,select,textarea{border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;padding:0 14px;width:100%;outline:none}
input,select{height:52px}textarea{min-height:100px;padding-top:12px;resize:vertical}select option{color:#111}
nav{padding:16px 6%;display:flex;justify-content:space-between;align-items:center;background:rgba(5,9,20,.72);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:12px}.x{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,#00c6ff,#0072ff);display:grid;place-items:center;font-weight:900}.logo h1{font-size:27px}.logo small{color:rgba(255,255,255,.55)}
.hero{padding:60px 6%;display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:center}.hero h2{font-size:52px;line-height:1.18;margin-bottom:16px}.hero p{color:rgba(255,255,255,.65);font-size:18px;line-height:2}
.grad{background:linear-gradient(90deg,#00c6ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card,.panel{border-radius:28px;padding:20px}.form{display:grid;gap:10px}.tabs{display:flex;gap:10px;margin-bottom:12px}.tabs .btn{flex:1}
.app{display:none}.app.active{display:block}.layout{display:grid;grid-template-columns:260px 1fr;gap:18px;padding:20px}.side{border-radius:30px;padding:18px;min-height:calc(100vh - 40px);position:sticky;top:20px}.side button{width:100%;margin:6px 0;text-align:right}.side button.active{background:linear-gradient(135deg,rgba(0,198,255,.26),rgba(0,114,255,.18))}
.page{display:none}.page.active{display:block}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{border-radius:22px;padding:16px}.kpi h3{font-size:30px}.kpi p{color:rgba(255,255,255,.58)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.item{border-radius:24px;padding:18px;transition:.2s}.item:hover{background:rgba(255,255,255,.09)}.item p{color:rgba(255,255,255,.62);line-height:1.75}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.pill,.tag{display:inline-flex;padding:6px 10px;border-radius:30px;background:rgba(0,198,255,.14);color:#80e8ff;font-size:12px;margin:3px}.pending{background:rgba(245,158,11,.16);color:#fcd34d}.accepted{background:rgba(34,197,94,.16);color:#86efac}.rejected{background:rgba(239,68,68,.16);color:#fca5a5}
.toast{position:fixed;bottom:20px;left:20px;z-index:99;padding:13px 18px;border-radius:16px;background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.3);color:#86efac;display:none}.toast.err{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.3);color:#fca5a5}
.searchbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}.meta{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.meta span{padding:6px 10px;border-radius:30px;background:rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.75)}
@media(max-width:950px){.hero,.layout{grid-template-columns:1fr}.hero{padding:40px 20px}.hero h2{font-size:34px}.grid,.kpis,.fg,.searchbar{grid-template-columns:1fr}.side{position:relative;min-height:auto}nav{padding:14px 20px}}

.admin-guard{border-radius:18px;padding:14px;background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.25);color:#fca5a5;margin:12px 0}
</style><link rel="manifest" href="manifest.json"><meta name="theme-color" content="#0072ff"></head><body><div id=toast class=toast></div><nav><div class=logo><div class=x>A</div><div><h1>HireX Admin</h1><small>لوحة إدارة منفصلة</small></div></div><button class="btn p" onclick=scrollLogin()>دخول الإدارة</button></nav><main id=public><section class=hero><div><h2>Admin Dashboard <span class=grad>منفصل كليًا</span></h2><p>إدارة المستخدمين، الوظائف، الشركات، الباحثين، التقديمات والإحصائيات.</p></div><div class="card glass" id=loginBox><div class=form><input id=le placeholder=البريد><input id=lp type=password placeholder=كلمة_المرور><button class="btn p" onclick=login()>دخول الإدارة</button></div></div></section></main><section id=app class=app><div class=layout><aside class="side glass"><div class=logo style="margin-bottom:18px"><div class=x>A</div><h3>Admin</h3></div><button class="btn active" onclick="page('home',this)">الرئيسية</button><button class=btn onclick="page('users',this)">المستخدمين</button><button class=btn onclick="page('jobs',this)">الوظائف</button><button class=btn onclick="page('companies',this)">الشركات</button><button class=btn onclick="page('apps',this)">التقديمات</button><button class=btn onclick="page('verify',this)">طلبات التوثيق</button><button class="btn no" onclick=logout()>خروج</button></aside><main><div class="panel glass"><h2>لوحة الإدارة</h2><p style="color:rgba(255,255,255,.6)">منفصلة بالكامل عن الباحث والشركة</p></div><div id=page-home class="page active"><div class=kpis><div class="kpi glass"><h3 id=uc>0</h3><p>مستخدمين</p></div><div class="kpi glass"><h3 id=jc>0</h3><p>وظائف</p></div><div class="kpi glass"><h3 id=sc>0</h3><p>باحثين</p></div><div class="kpi glass"><h3 id=ac>0</h3><p>تقديمات</p></div></div></div><div id=page-users class=page><div class="panel glass"><h3>المستخدمين</h3><div id=usersList></div></div></div><div id=page-jobs class=page><div class="panel glass"><h3>الوظائف</h3><div id=jobsList></div></div></div><div id=page-companies class=page><div class="panel glass"><h3>الشركات</h3><div id=companiesList></div></div></div><div id=page-apps class=page><div class="panel glass"><h3>التقديمات</h3><div id=appsList></div></div></div><div id=page-verify class=page><div class="panel glass"><h3>طلبات التوثيق</h3><div id=verifyList></div></div></div></main></div></section><script>
const db=supabase.createClient('https://odfcsexotylhsstybiju.supabase.co','sb_publishable_zJnpojEcE7O9kOfrnIt4Iw_9UGzunBH');let user=null,users=[],jobs=[],seekers=[],apps=[],companies=[],verifications=[];function msg(t,e=0){toast.textContent=t;toast.className=e?'toast err':'toast';toast.style.display='block';setTimeout(()=>toast.style.display='none',2500)}function scrollLogin(){loginBox.scrollIntoView({behavior:'smooth'})}async function login(){let {data,error}=await db.auth.signInWithPassword({email:le.value,password:lp.value});if(error)return msg(error.message,1);user=data.user;await load();
let meRes=await db.from('users').select('*').eq('id',user.id).single();
let me=meRes.data;
if(!me || me.role !== 'admin'){
  document.body.innerHTML='<div style="min-height:100vh;display:grid;place-items:center;padding:20px"><div class="admin-guard glass"><h2>لوحة الإدارة محمية</h2><p>هذا الرابط خاص بالإدارة فقط.</p><a class="btn p" href="index.html">العودة للرئيسية</a></div></div>';
  return;
}
public.style.display='none';app.classList.add('active')}async function load(){let [u,j,s,a,c,v]=await Promise.all([db.from('users').select('*'),db.from('jobs').select('*').order('created_at',{ascending:false}),db.from('seekers').select('*').order('created_at',{ascending:false}),db.from('applications').select('*').order('created_at',{ascending:false}),db.from('companies').select('*'),db.from('verification_requests').select('*').order('created_at',{ascending:false})]);users=u.data||[];jobs=j.data||[];seekers=s.data||[];apps=a.data||[];companies=c.data||[];verifications=v.data||[];render()}function page(p,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.side .btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}function render(){uc.textContent=users.length;jc.textContent=jobs.length;sc.textContent=seekers.length;ac.textContent=apps.length;usersList.innerHTML=users.map(x=>`<div class="item glass"><h3>${x.full_name||''}</h3><p>${x.email||x.phone||''} • ${x.role||''}</p></div>`).join('');jobsList.innerHTML=jobs.map(x=>`<div class="item glass"><h3>${x.title}</h3><p>${x.company_name} • ${x.city}</p><button class="btn no" onclick="delJob(${x.id})">حذف</button></div>`).join('');companiesList.innerHTML=companies.map(x=>`<div class="item glass"><h3>${x.company_name}</h3><p>${x.city} • ${x.industry}</p></div>`).join('');verifyList.innerHTML=verifications.map(x=>`<div class="item glass"><h3>${x.requester_name}</h3><p>${x.user_role} • ${x.document_name}</p>${x.document_url?`<a class="btn p" href="${x.document_url}" target="_blank">فتح المستند</a>`:''}<span class="pill ${x.status}">${x.status}</span><button class="btn ok" onclick="updateVerify(${x.id},'verified')">توثيق</button><button class="btn no" onclick="updateVerify(${x.id},'rejected')">رفض</button></div>`).join('')||'<p>لا توجد طلبات</p>';appsList.innerHTML=apps.map(x=>`<div class="item glass"><h3>${x.applicant_name}</h3><p>${x.job_title} • ${x.status}</p></div>`).join('')}async function updateVerify(id,status){
  const req = verifications.find(v => v.id === id);
  if(!req){ msg('لم يتم العثور على الطلب', true); return; }

  await db.from('verification_requests').update({status}).eq('id', id);

  if(req.user_role === 'company'){
    await db.from('companies').update({verification_status: status}).eq('owner_id', req.user_id);
  }

  if(req.user_role === 'candidate'){
    await db.from('seekers').update({verification_status: status}).eq('owner_id', req.user_id);
  }

  if(req.user_id){
    await db.from('notifications').insert({
      user_id: req.user_id,
      title: status === 'verified' ? 'تم قبول التوثيق' : 'تم رفض التوثيق',
      details: status === 'verified' ? 'تم قبول طلب توثيق الحساب.' : 'تم رفض طلب توثيق الحساب.'
    });
  }

  await load();
  msg('تم تحديث حالة التوثيق');
}

async function delJob(id){await db.from('jobs').delete().eq('id',id);await load();msg('تم حذف الوظيفة')}async function logout(){await db.auth.signOut();location.reload()}window.addEventListener('load',async()=>{await load()});
</script><script>if('serviceWorker' in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{})}</script></body></html>
