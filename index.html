<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tasneef ERP V012 - Smart Inbox Operations Center</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="erp-shell">
    <aside class="right-sidebar" id="sidebar">
      <div class="sidebar-brand-row">
        <button class="hamburger" title="القائمة">☰</button>
        <div class="mini-brand">FM</div>
      </div>

      <div class="sidebar-search">
        <span class="shortcut">Ctrl + K</span>
        <input id="globalSearch" placeholder="ابحث عن أي شيء..." />
        <span class="search-icon">⌕</span>
      </div>

      <nav class="sidebar-nav" id="nav"></nav>
    </aside>

    <main class="main-area">
      <header class="top-header">
        <div class="user-box">
          <div class="avatar">FM</div>
          <div>
            <strong>مدير النظام</strong>
            <span>TASNEEF-FM</span>
          </div>
          <button class="tiny-arrow">⌄</button>
        </div>
        <div class="header-icons">
          <button title="الإشعارات">♡</button>
          <button title="التنبيهات">🔔</button>
          <button title="الإعدادات">⚙</button>
          <button title="اللغة">◎</button>
        </div>
        <div class="logo-wrap">
          <img src="tasneef_logo.png" alt="Tasneef Facilities Management" />
        </div>
      </header>

      <section class="work-layout" id="content">
        <section class="document-empty">
          <div class="empty-card">
            <div class="mail-illustration">
              <span class="spark s1">✦</span>
              <span class="spark s2">✦</span>
              <span class="spark s3">•</span>
              <div class="paper"></div>
              <div class="envelope">
                <div class="flap"></div>
              </div>
              <div class="shadow"></div>
            </div>
            <h2>لم يتم اختيار أي مستند</h2>
            <p>اختر مستندًا من القائمة لرؤية نشاط العميل والبريد الأصلي وملاحظات الفريق.</p>
          </div>
        </section>

        <aside class="inbox-panel">
          <div class="inbox-head">
            <button class="refresh" title="تحديث">⟳</button>
            <h1>البريد الوارد</h1>
            <div class="channel-icons"><span>◉</span><span>✉</span></div>
          </div>
          <div class="inbox-search">
            <input placeholder="البحث" />
            <span>⌕</span>
          </div>
          <div class="inbox-tabs">
            <label class="select-all"><input type="checkbox" /></label>
            <button class="active">الكل</button>
            <button>في انتظار المعالجة <span class="count">1</span></button>
            <button>تم</button>
          </div>
          <article class="message-row active">
            <input type="checkbox" />
            <div>
              <strong>مرحبًا بك في صندوق الوارد الخاص بك على تصنيف - ابدأ الآن!</strong>
              <small>منذ 9 دقائق</small>
              <em>غير معالج</em>
            </div>
          </article>
        </aside>
      </section>
    </main>
  </div>

  <button class="help-float"><span>💬</span></button>
  <span class="help-label">مركز المساعدة</span>

  <div id="smartModal" class="smart-modal hidden"></div>
  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
