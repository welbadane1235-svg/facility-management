<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صالون النخبة - سبا</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Header -->
    <header class="bg-indigo-900 text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold">صالون وسبا النخبة</h1>
        <p class="mt-2 text-indigo-200">احجز جلستك القادمة بضغطة زر</p>
    </header>

    <!-- Services Section -->
    <main class="max-w-4xl mx-auto p-6">
        <h2 class="text-2xl font-semibold mb-6 border-b-2 border-indigo-500 pb-2">خدماتنا</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Service Item 1 -->
            <div class="bg-white p-4 rounded-xl shadow-md flex justify-between items-center border hover:border-indigo-400 transition">
                <div>
                    <h3 class="font-bold text-lg">قص شعر عصري</h3>
                    <p class="text-sm text-gray-500">يشمل غسيل وتصفيف</p>
                    <span class="text-indigo-600 font-bold block mt-2">100 ريال</span>
                </div>
                <button onclick="bookService('قص شعر')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">حجز</button>
            </div>

            <!-- Service Item 2 -->
            <div class="bg-white p-4 rounded-xl shadow-md flex justify-between items-center border hover:border-indigo-400 transition">
                <div>
                    <h3 class="font-bold text-lg">جلسة مساج (60 دقيقة)</h3>
                    <p class="text-sm text-gray-500">استرخاء كامل للجسم</p>
                    <span class="text-indigo-600 font-bold block mt-2">250 ريال</span>
                </div>
                <button onclick="bookService('مساج')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">حجز</button>
            </div>
        </div>
    </main>

    <script>
        function bookService(serviceName) {
            alert("تم اختيار خدمة: " + serviceName + ". سيتم توجيهك لصفحة المواعيد!");
        }
    </script>
</body>
</html>
