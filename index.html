<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HireX P06</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;font-family:Cairo,sans-serif}body{margin:0;background:#050914;color:#fff}body:before{content:"";position:fixed;inset:-30%;background:radial-gradient(circle at 80% 10%,rgba(0,198,255,.18),transparent 25%),radial-gradient(circle at 10% 90%,rgba(139,92,246,.18),transparent 25%);z-index:-1}.glass{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.25)}.btn{border:0;border-radius:16px;padding:12px 18px;color:#fff;font-weight:800;cursor:pointer;background:rgba(255,255,255,.08)}.p{background:linear-gradient(135deg,#00c6ff,#0072ff)}.ok{background:rgba(34,197,94,.18);color:#86efac}.no{background:rgba(239,68,68,.18);color:#fca5a5}input,select{height:52px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;padding:0 12px;width:100%}select option{color:#111}nav{padding:18px 7%;display:flex;justify-content:space-between;align-items:center;background:rgba(5,9,20,.7);position:sticky;top:0;z-index:5}.logo{font-weight:900;font-size:28px}.hero,.sec{padding:45px 7%}.hero{display:grid;grid-template-columns:1fr 420px;gap:22px;align-items:center}.hero h1{font-size:52px;line-height:1.25}.grad{background:linear-gradient(90deg,#00c6ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.card{border-radius:28px;padding:22px}.form{display:grid;gap:10px}.tabs{display:flex;gap:8px;margin-bottom:10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.cat,.item{border-radius:24px;padding:18px}.cat{cursor:pointer}.cat:hover,.item:hover{background:rgba(255,255,255,.09)}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.pill{display:inline-flex;padding:6px 10px;border-radius:30px;background:rgba(0,198,255,.14);color:#80e8ff;font-size:12px;margin:3px}.pending{background:rgba(245,158,11,.16);color:#fcd34d}.accepted{background:rgba(34,197,94,.16);color:#86efac}.rejected{background:rgba(239,68,68,.16);color:#fca5a5}.dash{display:none}.dash.active{display:block}.layout{display:grid;grid-template-columns:250px 1fr;gap:18px;padding:20px}.side{border-radius:28px;padding:18px;min-height:calc(100vh - 40px)}.side button{width:100%;margin:5px 0;text-align:right}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{border-radius:22px;padding:16px}.panel{border-radius:28px;padding:20px;margin-top:16px}.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.toast{position:fixed;left:20px;bottom:20px;padding:12px 18px;border-radius:16px;background:rgba(34,197,94,.18);color:#86efac;display:none;z-index:9}.err{background:rgba(239,68,68,.18);color:#fca5a5}@media(max-width:900px){.hero,.layout{grid-template-columns:1fr}.grid,.cards,.kpis,.fg{grid-template-columns:1fr}.hero h1{font-size:34px}}
</style></head><body><div id="toast" class="toast"></div><nav id="nav"><div class="logo">HireX</div><button class="btn p" onclick="showAuth()">تسجيل / دخول</button></nav><main id="pub"><section class="hero"><div><h1>نظام <span class="grad">التقديم الحقيقي</span> على الوظائف</h1><p>زر تقديم يحفظ الطلب في Supabase ويظهر للشركة والباحث والإدارة.</p><button class="btn p" onclick="document.getElementById('cats').scrollIntoView({behavior:'smooth'})">التصنيفات</button></div><div class="card glass"><div class="tabs"><button class="btn p" onclick="mode='login';authUI()">دخول</button><button class="btn" onclick="mode='signup';authUI()">حساب جديد</button></div><div id="auth"></div></div></section><section class="sec" id="cats"><h2>التصنيفات</h2><div id="catGrid" class="grid"></div></section><section class="sec" id="res" style="display:none"><h2 id="resTitle"></h2><div id="resGrid" class="cards"></div></section></main><section id="app" class="dash"><div class="layout"><aside class="side glass"><h2 id="roleTitle">Dashboard</h2><button class="btn p">الرئيسية</button><button class="btn" onclick="document.getElementById('publishPanel').scrollIntoView({behavior:'smooth'})">النشر</button><button class="btn" onclick="document.getElementById('appsPanel').scrollIntoView({behavior:'smooth'})">الطلبات</button><button class="btn no" onclick="signOut()">خروج</button></aside><main><div class="panel glass"><h2 id="welcome"></h2><p id="sub"></p></div><div class="kpis"><div class="kpi glass"><h2 id="jc">0</h2><p>وظائف</p></div><div class="kpi glass"><h2 id="sc">0</h2><p>باحثين</p></div><div class="kpi glass"><h2 id="ac">0</h2><p>طلبات</p></div><div class="kpi glass"><h2 id="rr">-</h2><p>الدور</p></div></div><div class="panel glass" id="publishPanel"><h3>النشر</h3><div id="companyForm"><h4>نشر وظيفة</h4><div class="fg"><input id="jt" placeholder="المسمى"><input id="jcity" placeholder="المدينة"><select id="jcat"></select><input id="jsal" placeholder="الراتب"><input id="jtype" placeholder="نوع الدوام"><button class="btn p full" onclick="publishJob()">نشر وظيفة</button></div></div><div id="seekerForm"><h4>نشر ملف باحث</h4><div class="fg"><input id="sn" placeholder="الاسم"><input id="st" placeholder="التخصص"><input id="scity" placeholder="المدينة"><select id="scat"></select><input id="sexp" placeholder="الخبرة"><input id="sskills" placeholder="المهارات بفواصل"><button class="btn p full" onclick="publishSeeker()">نشر ملفي</button></div></div></div><div class="panel glass" id="appsPanel"><h3 id="appsTitle">طلبات التقديم</h3><div id="appsList"></div></div></main></div></section><script>
const db=supabase.createClient('https://odfcsexotylhsstybiju.supabase.co','sb_publishable_zJnpojEcE7O9kOfrnIt4Iw_9UGzunBH');let mode='login',user=null,profile=null,cats=[],jobs=[],seekers=[],apps=[],sel='';const fall=[{name:'إدارة',icon:'🏢',description:'إدارة وتشغيل'},{name:'مطاعم',icon:'🍽️',description:'مطاعم وكافيهات'},{name:'تسويق',icon:'📣',description:'تسويق ومبيعات'},{name:'برمجة',icon:'💻',description:'تقنية وبرمجة'},{name:'سائق',icon:'🚗',description:'نقل وتوصيل'},{name:'مهندسين',icon:'🛠️',description:'هندسة ومشاريع'},{name:'موارد بشرية',icon:'👥',description:'توظيف وموظفين'},{name:'فنيين وصيانة',icon:'🔧',description:'صيانة عامة'}];function msg(t,e=0){let x=document.getElementById('toast');x.textContent=t;x.className=e?'toast err':'toast';x.style.display='block';setTimeout(()=>x.style.display='none',2500)}function showAuth(){mode='login';authUI();document.querySelector('.hero').scrollIntoView({behavior:'smooth'})}function authUI(){auth.innerHTML=mode==='login'?`<div class=form><input id=le placeholder="البريد"><input id=lp type=password placeholder="كلمة المرور"><button class="btn p" onclick=login()>دخول</button><button class=btn onclick="mode='signup';authUI()">حساب جديد</button></div>`:`<div class=form><input id=snm placeholder="الاسم / الشركة"><input id=se placeholder="البريد"><input id=sp type=password placeholder="كلمة المرور"><select id=sr><option value=candidate>باحث عن عمل</option><option value=company>شركة</option><option value=admin>إدارة</option></select><button class="btn p" onclick=signup()>إنشاء</button><button class=btn onclick="mode='login';authUI()">لدي حساب</button></div>`}
async function signup(){let full_name=snm.value.trim(),email=se.value.trim(),password=sp.value,role=sr.value;if(!full_name||!email||!password)return msg('أكمل البيانات',1);let {data,error}=await db.auth.signUp({email,password});if(error)return msg(error.message,1);let u=data.user;if(!u)return msg('أكد البريد ثم سجل دخول');let r=await db.from('users').upsert({id:u.id,full_name,phone:email,role});if(r.error)return msg(r.error.message,1);await loginWith(email,password)}async function login(){await loginWith(le.value.trim(),lp.value)}async function loginWith(email,password){let {data,error}=await db.auth.signInWithPassword({email,password});if(error)return msg(error.message,1);user=data.user;await loadProfile();openDash()}async function loadProfile(){let {data:{user:u}}=await db.auth.getUser();user=u;if(!u)return;let {data}=await db.from('users').select('*').eq('id',u.id).single();if(!data){data={id:u.id,full_name:u.email,phone:u.email,role:'candidate'};await db.from('users').upsert(data)}profile=data}async function signOut(){await db.auth.signOut();location.reload()}async function ensureCats(){let r=await db.from('categories').select('*').order('id');if(r.error){cats=fall;return}if(!r.data||!r.data.length){await db.from('categories').insert(fall);r=await db.from('categories').select('*').order('id')}cats=r.data||fall}async function loadData(){await ensureCats();let [j,s,a]=await Promise.all([db.from('jobs').select('*').order('created_at',{ascending:false}),db.from('seekers').select('*').order('created_at',{ascending:false}),db.from('applications').select('*').order('created_at',{ascending:false})]);jobs=j.data||[];seekers=s.data||[];apps=a.data||[];render()}function render(){let opts=cats.map(c=>`<option value="${c.name}">${c.name}</option>`).join('');['jcat','scat'].forEach(i=>{let e=document.getElementById(i);if(e)e.innerHTML=opts});catGrid.innerHTML=cats.map(c=>`<div class="cat glass" onclick="openCat('${c.name}')"><div class=icon>${c.icon||'📌'}</div><h3>${c.name}</h3><p>${c.description||''}</p><span class=pill>${jobs.filter(j=>j.category===c.name).length} وظيفة</span> <span class=pill>${seekers.filter(s=>s.category===c.name).length} باحث</span></div>`).join('');dashRender()}function openCat(c){sel=c;res.style.display='block';resTitle.textContent='وظائف في '+c;let d=jobs.filter(j=>j.category===c);resGrid.innerHTML=`<div class="item glass"><button class="btn p" onclick="showSeekers()">عرض الباحثين عن عمل</button></div>`+(d.map(jobCard).join('')||'<div class="item glass">لا توجد وظائف</div>');res.scrollIntoView({behavior:'smooth'})}function showSeekers(){resTitle.textContent='باحثون في '+sel;let d=seekers.filter(s=>s.category===sel);resGrid.innerHTML=`<div class="item glass"><button class="btn p" onclick="openCat(sel)">عرض الوظائف</button></div>`+(d.map(seekerCard).join('')||'<div class="item glass">لا يوجد باحثون</div>')}function jobCard(j){return `<div class="item glass"><h3>${j.title||''}</h3><p>${j.company_name||'شركة'}</p><div class=meta><span>${j.city||''}</span><span>${j.work_type||''}</span></div><h3 class=grad>${j.salary||'حسب الاتفاق'}</h3><button class="btn p" onclick="applyJob(${j.id})">تقديم</button></div>`}function seekerCard(s){return `<div class="item glass"><h3>${s.full_name||''}</h3><p>${s.title||''}</p><div class=meta><span>${s.city||''}</span><span>${s.experience||''}</span></div><p>${(s.skills||[]).join(' • ')}</p></div>`}async function applyJob(id){if(!user||!profile)return msg('سجل دخول كباحث أولاً',1);if(profile.role!=='candidate'&&profile.role!=='admin')return msg('التقديم للباحث فقط',1);let j=jobs.find(x=>x.id===id);if(apps.find(a=>a.job_id===id&&a.applicant_user_id===user.id))return msg('قدمت من قبل',1);let r=await db.from('applications').insert({job_id:id,applicant_user_id:user.id,applicant_name:profile.full_name,job_title:j.title,company_name:j.company_name,status:'pending',note:'تقديم من HireX'});if(r.error)return msg(r.error.message,1);await loadData();msg('تم التقديم')}function openDash(){pub.style.display='none';nav.style.display='none';app.classList.add('active');let r=profile.role;roleTitle.textContent=r==='company'?'شركة':r==='admin'?'إدارة':'باحث';welcome.textContent='مرحبًا، '+profile.full_name;sub.textContent='نوع الحساب: '+r;rr.textContent=r;companyForm.style.display=(r==='company'||r==='admin')?'block':'none';seekerForm.style.display=(r==='candidate'||r==='admin')?'block':'none';dashRender()}function dashRender(){if(!document.getElementById('jc'))return;jc.textContent=jobs.length;sc.textContent=seekers.length;ac.textContent=apps.length;let r=profile?.role||'candidate',d=apps;if(r==='candidate')d=apps.filter(a=>a.applicant_user_id===user?.id);appsTitle.textContent=r==='company'?'طلبات على الوظائف':r==='admin'?'كل الطلبات':'طلباتي';appsList.innerHTML=d.length?d.map(appCard).join(''):'<p>لا توجد طلبات</p>'}function appCard(a){let r=profile?.role;let controls=(r==='company'||r==='admin')?`<div class=row-actions><button class="btn ok" onclick="updApp(${a.id},'accepted')">قبول</button><button class="btn no" onclick="updApp(${a.id},'rejected')">رفض</button><button class=btn onclick="updApp(${a.id},'pending')">تعليق</button></div>`:'';return `<div class="item glass" style="margin-top:10px"><h3>${a.applicant_name||'متقدم'}</h3><p>${a.job_title||''} • ${a.company_name||''}</p><span class="pill ${a.status||'pending'}">${a.status||'pending'}</span>${controls}</div>`}async function updApp(id,status){let r=await db.from('applications').update({status}).eq('id',id);if(r.error)return msg(r.error.message,1);await loadData();msg('تم تحديث الطلب')}async function publishJob(){if(!user)return msg('سجل دخول',1);let p={title:jt.value.trim(),city:jcity.value.trim(),category:jcat.value,salary:jsal.value.trim(),work_type:jtype.value.trim(),company_name:profile.full_name,owner_id:user.id};if(!p.title||!p.city)return msg('اكتب المسمى والمدينة',1);let r=await db.from('jobs').insert(p);if(r.error)return msg(r.error.message,1);jt.value=jcity.value=jsal.value=jtype.value='';await loadData();msg('تم نشر الوظيفة')}async function publishSeeker(){if(!user)return msg('سجل دخول',1);let skills=sskills.value.split(',').map(x=>x.trim()).filter(Boolean);let p={full_name:sn.value.trim()||profile.full_name,title:st.value.trim(),city:scity.value.trim(),category:scat.value,experience:sexp.value.trim(),skills:skills.length?skills:['مهارة عامة'],owner_id:user.id};if(!p.full_name||!p.title||!p.city)return msg('أكمل البيانات',1);let r=await db.from('seekers').insert(p);if(r.error)return msg(r.error.message,1);sn.value=st.value=scity.value=sexp.value=sskills.value='';await loadData();msg('تم نشر ملفك')}window.addEventListener('load',async()=>{authUI();await loadData();await loadProfile();if(user)openDash()});
</script></body></html>
