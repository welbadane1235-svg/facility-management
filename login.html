<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>تسجيل الدخول | HireX</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/><style>
:root{--bg:#08111f;--card:rgba(255,255,255,.075);--border:rgba(255,255,255,.12);--muted:#a8b3c7;--muted2:#7c899e;--green:#34d399;--cyan:#22d3ee;--danger:#fb7185}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Tajawal,system-ui,sans-serif;background:radial-gradient(circle at 80% 0%,rgba(52,211,153,.2),transparent 34%),radial-gradient(circle at 10% 35%,rgba(34,211,238,.16),transparent 30%),#08111f;color:#fff;min-height:100vh;line-height:1.7}
a{text-decoration:none;color:inherit}button,input,select,textarea{font-family:inherit}.container{width:min(1180px,calc(100% - 32px));margin:auto}
.header{position:sticky;top:0;z-index:50;background:rgba(8,17,31,.82);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}.nav{height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),var(--cyan));color:#06111d;font-weight:900;font-size:22px}.brand-title{font-size:26px;font-weight:900}.brand-sub{font-size:12px;color:var(--muted2)}
.links{display:flex;gap:22px;color:var(--muted);font-weight:800}.links a:hover,.links a.active{color:#fff}.page{padding:42px 0 70px}.grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:18px}.card{border:1px solid var(--border);background:var(--card);border-radius:28px;padding:24px}.badge{display:inline-flex;margin-bottom:14px;padding:8px 12px;border-radius:999px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.22);color:#d1fae5;font-weight:900}.title{font-size:clamp(34px,4vw,58px);line-height:1.12;font-weight:900}.desc{color:var(--muted);font-size:18px;margin-top:8px}
.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:8px;border-radius:24px;background:rgba(8,17,31,.72);border:1px solid rgba(255,255,255,.1);margin-bottom:18px}.tab{min-height:64px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.055);color:var(--muted);cursor:pointer;font-weight:900}.tab.active{color:#06111d;background:linear-gradient(135deg,var(--green),var(--cyan));border-color:transparent}
.form{display:none}.form.active{display:block}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}.label{display:block;color:var(--muted);font-weight:900;margin-bottom:7px;font-size:14px}.input,.select,.textarea{width:100%;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(8,17,31,.72);color:#fff;outline:none;padding:0 14px;font-size:15px;font-weight:700}.input,.select{height:52px}.textarea{min-height:110px;padding-top:12px;resize:vertical}option{background:#08111f}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.actions .btn{flex:1}
.btn{min-height:46px;padding:0 20px;border:0;border-radius:16px;cursor:pointer;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn-primary{background:linear-gradient(135deg,var(--green),var(--cyan));color:#06111d}.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff}
.debug{margin-top:18px;border:1px solid rgba(255,255,255,.12);background:rgba(8,17,31,.72);border-radius:20px;padding:14px;white-space:pre-wrap;direction:ltr;text-align:left;color:#d1fae5;font-size:13px;max-height:380px;overflow:auto}.debug.error{color:#fecdd3;border-color:rgba(251,113,133,.35);background:rgba(251,113,133,.08)}
.toast{position:fixed;bottom:22px;left:22px;z-index:80;max-width:430px;padding:14px 16px;border-radius:18px;color:#06111d;background:#fff;box-shadow:0 16px 46px rgba(0,0,0,.24);font-weight:800;display:none}.toast.show{display:block}
.notice{margin-top:18px;border:1px solid rgba(251,191,36,.25);background:rgba(251,191,36,.08);border-radius:18px;padding:14px;color:#fde68a;font-weight:800}
@media(max-width:900px){.links{display:none}.grid,.form-grid,.tabs{grid-template-columns:1fr}.actions .btn{width:100%;flex:unset}}@media(max-width:600px){.container{width:min(100% - 22px,1180px)}.card{border-radius:24px;padding:18px}.toast{right:12px;left:12px;bottom:14px}}
</style></head><body><header class="header"><div class="container"><nav class="nav">
<a class="brand" href="index.html"><div class="logo">H</div><div><div class="brand-title">HireX</div><div class="brand-sub">منصة التوظيف والفرص المهنية</div></div></a>
<div class="links"><a href="index.html">الرئيسية</a><a href="jobs.html">الوظائف</a><a href="companies.html">للشركات</a><a href="candidates.html">للمرشحين</a><a class="active" href="login.html">تسجيل الدخول</a><a href="register.html">إنشاء حساب</a></div>
</nav></div></header><main class="page"><section class="container grid"><aside class="card"><div class="badge">🔐 دخول نهائي</div><h1 class="title">تسجيل الدخول إلى HireX</h1><p class="desc">يتم قراءة role من profiles ثم تحويلك للوحة المناسبة.</p><div class="debug" id="debugBox" style="display:none"></div></aside><section class="card"><h2 class="title" style="font-size:34px">تسجيل الدخول</h2><div class="tabs"><button class="tab active" data-role="candidate">👤 مرشح</button><button class="tab" data-role="company">🏢 شركة</button></div><form id="loginForm"><label class="label">البريد الإلكتروني</label><input class="input" id="email" type="email" required><label class="label">كلمة المرور</label><input class="input" id="password" type="password" required><div class="actions"><button class="btn btn-primary" type="submit">تسجيل الدخول</button><a class="btn btn-ghost" href="register.html">إنشاء حساب</a></div></form></section></section></main><div class="toast" id="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script>
const client=window.hirexSupabase,toast=document.getElementById("toast"),debugBox=document.getElementById("debugBox");let selectedRole="candidate";
function showToast(m){toast.textContent=m;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),3500)}
function debug(data){debugBox.style.display="block";debugBox.classList.add("error");debugBox.textContent=JSON.stringify(data,null,2)}
function targetByRole(role){return role==="company"?"company-dashboard.html":"candidate-dashboard.html"}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");selectedRole=b.dataset.role;});
async function getProfile(user){let r=await client.from("profiles").select("*").eq("id",user.id).maybeSingle();if(r.error)throw r.error;if(r.data)return r.data;let ins=await client.from("profiles").insert({id:user.id,role:user.user_metadata?.role||selectedRole,email:user.email,full_name:user.user_metadata?.full_name||user.email?.split("@")[0]||"مستخدم جديد",company_name:user.user_metadata?.company_name||null,city:user.user_metadata?.city||"الرياض",updated_at:new Date().toISOString()}).select("*").single();if(ins.error)throw ins.error;return ins.data}
loginForm.onsubmit=async e=>{e.preventDefault();try{showToast("جاري تسجيل الدخول...");const auth=await client.auth.signInWithPassword({email:email.value.trim(),password:password.value});if(auth.error){debug({message:auth.error.message,code:auth.error.code||null});return showToast(auth.error.message)}const profile=await getProfile(auth.data.user);showToast("تم تسجيل الدخول بنجاح.");setTimeout(()=>location.href=targetByRole(profile.role||selectedRole),700)}catch(err){debug({message:err.message});showToast(err.message||"حدث خطأ أثناء تسجيل الدخول.")}};
</script></body></html>
