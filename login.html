<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>تسجيل الدخول | HireX</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/><style>
:root{--bg:#08111f;--card:rgba(255,255,255,.075);--border:rgba(255,255,255,.12);--text:#fff;--muted:#a8b3c7;--muted2:#7c899e;--green:#34d399;--cyan:#22d3ee;--danger:#fb7185}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,system-ui,sans-serif;background:radial-gradient(circle at 80% 0%,rgba(52,211,153,.2),transparent 34%),radial-gradient(circle at 10% 35%,rgba(34,211,238,.16),transparent 30%),#08111f;color:#fff;min-height:100vh;line-height:1.7}
a{text-decoration:none;color:inherit}button,input,select,textarea{font-family:inherit}.container{width:min(1180px,calc(100% - 32px));margin:auto}
.header{position:sticky;top:0;z-index:50;background:rgba(8,17,31,.82);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}.nav{height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),var(--cyan));color:#06111d;font-weight:900;font-size:22px}.brand-title{font-size:26px;font-weight:900}.brand-sub{font-size:12px;color:var(--muted2)}
.links{display:flex;gap:22px;color:var(--muted);font-weight:800}.links a:hover,.links a.active{color:#fff}.btn{min-height:46px;padding:0 20px;border:0;border-radius:16px;cursor:pointer;font-weight:900;display:inline-flex;align-items:center;justify-content:center}.btn-primary{background:linear-gradient(135deg,var(--green),var(--cyan));color:#06111d}.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff}
.page{padding:42px 0 70px}.card{border:1px solid var(--border);background:var(--card);border-radius:28px;box-shadow:0 18px 52px rgba(0,0,0,.12);padding:24px}.badge{display:inline-flex;margin-bottom:14px;padding:8px 12px;border-radius:999px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.22);color:#d1fae5;font-weight:900}.title{font-size:clamp(34px,4vw,58px);line-height:1.12;font-weight:900}.desc{color:var(--muted);font-size:18px;margin-top:8px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.input,.select,.textarea{width:100%;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(8,17,31,.72);color:#fff;outline:none;padding:0 14px;font-size:15px;font-weight:700}.input,.select{height:52px}.textarea{min-height:110px;padding-top:12px;resize:vertical}option{background:#08111f}.label{display:block;color:var(--muted);font-weight:900;margin-bottom:7px;font-size:14px}
.toast{position:fixed;bottom:22px;left:22px;z-index:80;max-width:430px;padding:14px 16px;border-radius:18px;color:#06111d;background:#fff;box-shadow:0 16px 46px rgba(0,0,0,.24);font-weight:800;display:none}.toast.show{display:block}
.footer{border-top:1px solid var(--border);padding:28px 0;color:var(--muted2);font-weight:700}.foot{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}@media(max-width:980px){.links{display:none}.grid{grid-template-columns:1fr!important}}@media(max-width:600px){.container{width:min(100% - 22px,1180px)}.card{border-radius:24px;padding:18px}.actions .btn{width:100%}.toast{right:12px;left:12px;bottom:14px}}
.grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:18px}.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:8px;border-radius:24px;background:rgba(8,17,31,.72);border:1px solid rgba(255,255,255,.1);margin:18px 0}.tab{min-height:60px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.055);color:var(--muted);cursor:pointer;font-weight:900}.tab.active{color:#06111d;background:linear-gradient(135deg,var(--green),var(--cyan));border-color:transparent}.form-grid{display:grid;gap:12px}</style></head><body><header class="header"><div class="container"><nav class="nav">
<a class="brand" href="index.html"><div class="logo">H</div><div><div class="brand-title">HireX</div><div class="brand-sub">منصة التوظيف والفرص المهنية</div></div></a>
<div class="links">
<a class="" href="index.html">الرئيسية</a>
<a class="" href="jobs.html">الوظائف</a>
<a href="companies.html">للشركات</a>

<a class="" href="register.html">إنشاء حساب</a>
</div></nav></div></header><main class="page"><section class="container grid"><aside class="card"><div class="badge">🔐 دخول آمن</div><h1 class="title">ادخل إلى حسابك وتابع رحلتك في HireX.</h1><p class="desc">بعد نجاح الدخول سيتم تحويلك مباشرة إلى لوحة المرشح.</p></aside><section class="card"><h2 class="title" style="font-size:34px">تسجيل الدخول</h2><div class="tabs"><button type="button" class="tab active" data-role="candidate">👤 مرشح</button><button type="button" class="tab" data-role="company">🏢 شركة</button></div><form id="loginForm"><div class="form-grid"><div><label class="label">البريد الإلكتروني</label><input class="input" id="email" type="email" required/></div><div><label class="label">كلمة المرور</label><input class="input" id="password" type="password" required/></div></div><div class="actions"><button class="btn btn-primary" type="submit">تسجيل الدخول</button><a class="btn btn-ghost" href="register.html">إنشاء حساب جديد</a></div></form></section></section></main><footer class="footer"><div class="container foot"><div>© 2026 HireX</div><div>Supabase Login</div></div></footer><div class="toast" id="toast"></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script><script>
const client=window.hirexSupabase,toast=document.getElementById("toast");let selectedRole="candidate";function showToast(m){toast.textContent=m;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),3500)}document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");selectedRole=b.dataset.role;});
async function getOrCreateProfile(user){let {data:profile,error}=await client.from("profiles").select("*").eq("id",user.id).maybeSingle();if(error)throw error;if(profile)return profile;const fallback={id:user.id,role:user.user_metadata?.role||selectedRole||"candidate",full_name:user.user_metadata?.full_name||user.email?.split("@")[0]||"مرشح جديد",email:user.email,city:"الرياض",specialty:"محاسبة",experience:"حديث تخرج",updated_at:new Date().toISOString()};const {data:created,error:insertError}=await client.from("profiles").insert(fallback).select("*").single();if(insertError)throw insertError;return created;}
loginForm.onsubmit=async(e)=>{e.preventDefault();try{showToast("جاري تسجيل الدخول...");const {data,error}=await client.auth.signInWithPassword({email:email.value.trim(),password:password.value});if(error)return showToast(error.message);const profile=await getOrCreateProfile(data.user);showToast("تم تسجيل الدخول بنجاح.");setTimeout(()=>{window.location.href=;},700);}catch(err){showToast(err.message||"حدث خطأ أثناء تسجيل الدخول.");}};
</script></body></html>
