<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>إنشاء حساب | HireX</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#08111f;--card:rgba(255,255,255,.075);--border:rgba(255,255,255,.12);--text:#fff;--muted:#a8b3c7;--muted2:#7c899e;--green:#34d399;--cyan:#22d3ee}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,system-ui,sans-serif;background:radial-gradient(circle at 80% 0%,rgba(52,211,153,.2),transparent 34%),radial-gradient(circle at 10% 35%,rgba(34,211,238,.16),transparent 30%),#08111f;color:#fff;min-height:100vh;line-height:1.7}
a{text-decoration:none;color:inherit}button,input,select,textarea{font-family:inherit}.container{width:min(1180px,calc(100% - 32px));margin:auto}
.header{position:sticky;top:0;z-index:50;background:rgba(8,17,31,.82);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}.nav{height:78px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),var(--cyan));color:#06111d;font-weight:900;font-size:22px}.brand-title{font-size:26px;font-weight:900}.brand-sub{font-size:12px;color:var(--muted2)}
.links{display:flex;gap:22px;color:var(--muted);font-weight:800}.links a:hover,.links a.active{color:#fff}.btn{min-height:46px;padding:0 20px;border:0;border-radius:16px;cursor:pointer;font-weight:900;display:inline-flex;align-items:center;justify-content:center}.btn-primary{background:linear-gradient(135deg,var(--green),var(--cyan));color:#06111d}.btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff}
.page{padding:42px 0 70px}.grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:18px}.card{border:1px solid var(--border);background:var(--card);border-radius:28px;box-shadow:0 18px 52px rgba(0,0,0,.12);padding:24px}.badge{display:inline-flex;margin-bottom:14px;padding:8px 12px;border-radius:999px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.22);color:#d1fae5;font-weight:900}.title{font-size:clamp(34px,4vw,58px);line-height:1.12;font-weight:900}.desc{color:var(--muted);font-size:18px;margin-top:8px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.input,.select,.textarea{width:100%;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(8,17,31,.72);color:#fff;outline:none;padding:0 14px;font-size:15px;font-weight:700}.input,.select{height:52px}.textarea{min-height:110px;padding-top:12px;resize:vertical}option{background:#08111f}.label{display:block;color:var(--muted);font-weight:900;margin-bottom:7px;font-size:14px}.form-grid{display:grid;gap:12px}.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:8px;border-radius:24px;background:rgba(8,17,31,.72);border:1px solid rgba(255,255,255,.1);margin:18px 0}.tab{min-height:60px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.055);color:var(--muted);cursor:pointer;font-weight:900}.tab.active{color:#06111d;background:linear-gradient(135deg,var(--green),var(--cyan));border-color:transparent}
.toast{position:fixed;bottom:22px;left:22px;z-index:80;max-width:430px;padding:14px 16px;border-radius:18px;color:#06111d;background:#fff;box-shadow:0 16px 46px rgba(0,0,0,.24);font-weight:800;display:none}.toast.show{display:block}
.footer{border-top:1px solid var(--border);padding:28px 0;color:var(--muted2);font-weight:700}.foot{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap}@media(max-width:980px){.links{display:none}.grid{grid-template-columns:1fr!important}}@media(max-width:600px){.container{width:min(100% - 22px,1180px)}.card{border-radius:24px;padding:18px}.actions .btn{width:100%}.toast{right:12px;left:12px;bottom:14px}}
.form{display:none}.form.active{display:block}.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.full{grid-column:1/-1}@media(max-width:900px){.form-grid{grid-template-columns:1fr}}</style>
</head>
<body>
<header class="header"><div class="container"><nav class="nav">
<a class="brand" href="index.html"><div class="logo">H</div><div><div class="brand-title">HireX</div><div class="brand-sub">منصة التوظيف والفرص المهنية</div></div></a>
<div class="links">
<a href="index.html">الرئيسية</a>
<a href="jobs.html">الوظائف</a>
<a href="companies.html">للشركات</a>
<a href="candidates.html">للمرشحين</a>
<a href="login.html">تسجيل الدخول</a>
<a href="register.html">إنشاء حساب</a>
</div></nav></div></header>
<main class="page"><section class="container grid">
<aside class="card"><div class="badge">🚀 حساب جديد</div><h1 class="title">إنشاء حساب جديد</h1><p class="desc">اختر نوع الحساب وأكمل البيانات.</p></aside>
<section class="card">
<div class="tabs"><button class="tab active" data-type="candidate">👤 حساب مرشح</button><button class="tab" data-type="company">🏢 حساب شركة</button></div>
<form class="form active" id="candidateForm">
<div class="form-grid">
<div><label class="label">الاسم الكامل</label><input class="input" id="candidateName" required/></div>
<div><label class="label">البريد الإلكتروني</label><input class="input" id="candidateEmail" type="email" required/></div>
<div><label class="label">رقم الجوال</label><input class="input" id="candidatePhone"/></div>
<div><label class="label">المدينة</label><select class="select" id="candidateCity"><option>الرياض</option><option>جدة</option><option>الدمام</option><option>عن بعد</option></select></div>
<div><label class="label">التخصص</label><select class="select" id="candidateSpecialty"><option>محاسبة</option><option>طبية</option><option>تقنية</option><option>موارد بشرية</option><option>مبيعات</option><option>تشغيل</option></select></div>
<div><label class="label">الخبرة</label><select class="select" id="candidateExperience"><option>حديث تخرج</option><option>متوسط الخبرة</option><option>خبير</option></select></div>
<div><label class="label">كلمة المرور</label><input class="input" id="candidatePassword" type="password" required minlength="6"/></div>
<div><label class="label">تأكيد كلمة المرور</label><input class="input" id="candidateConfirmPassword" type="password" required minlength="6"/></div>
<div class="full"><label class="label">نبذة مختصرة</label><textarea class="textarea" id="candidateSummary"></textarea></div>
</div><div class="actions"><button class="btn btn-primary" type="submit">إنشاء حساب</button><a class="btn btn-ghost" href="login.html">تسجيل الدخول</a></div>
</form>
<form class="form" id="companyForm">
<div class="form-grid">
<div><label class="label">اسم الشركة</label><input class="input" id="companyName" required/></div>
<div><label class="label">البريد الرسمي</label><input class="input" id="companyEmail" type="email" required/></div>
<div><label class="label">مسؤول التواصل</label><input class="input" id="contactName" required/></div>
<div><label class="label">رقم التواصل</label><input class="input" id="companyPhone"/></div>
<div><label class="label">كلمة المرور</label><input class="input" id="companyPassword" type="password" required minlength="6"/></div>
<div><label class="label">تأكيد كلمة المرور</label><input class="input" id="companyConfirmPassword" type="password" required minlength="6"/></div>
</div><div class="actions"><button class="btn btn-primary" type="submit">إنشاء حساب</button><a class="btn btn-ghost" href="login.html">تسجيل الدخول</a></div>
</form>
</section></section></main>
<footer class="footer"><div class="container foot"><div>© 2026 HireX</div><div>Register fixed</div></div></footer><div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="supabase-config.js"></script>
<script>
const client=window.hirexSupabase,toast=document.getElementById("toast");
function showToast(m){toast.textContent=m;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),3500)}
document.querySelectorAll(".tab").forEach(tab=>tab.onclick=()=>{document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));tab.classList.add("active");candidateForm.classList.toggle("active",tab.dataset.type==="candidate");companyForm.classList.toggle("active",tab.dataset.type==="company");});
async function saveProfile(id,data){const {error}=await client.from("profiles").upsert({id,...data,updated_at:new Date().toISOString()});if(error)console.warn(error);}
candidateForm.onsubmit=async(e)=>{e.preventDefault();if(candidatePassword.value!==candidateConfirmPassword.value)return showToast("كلمة المرور غير متطابقة.");try{showToast("جاري إنشاء الحساب...");const email=candidateEmail.value.trim(),full_name=candidateName.value.trim();const {data,error}=await client.auth.signUp({email,password:candidatePassword.value,options:{data:{role:"candidate",full_name},emailRedirectTo:location.origin+location.pathname.replace("register.html","login.html")}});if(error)return showToast(error.message);if(data.user)await saveProfile(data.user.id,{role:"candidate",email,full_name,phone:candidatePhone.value,city:candidateCity.value,specialty:candidateSpecialty.value,experience:candidateExperience.value,summary:candidateSummary.value});showToast("تم إنشاء الحساب. انتقل لتسجيل الدخول.");setTimeout(()=>location.href="login.html",1200);}catch(err){showToast(err.message||"حدث خطأ أثناء التسجيل.");}};
companyForm.onsubmit=async(e)=>{e.preventDefault();if(companyPassword.value!==companyConfirmPassword.value)return showToast("كلمة المرور غير متطابقة.");try{showToast("جاري إنشاء الحساب...");const email=companyEmail.value.trim(),company_name=companyName.value.trim();const {data,error}=await client.auth.signUp({email,password:companyPassword.value,options:{data:{role:"company",company_name},emailRedirectTo:location.origin+location.pathname.replace("register.html","login.html")}});if(error)return showToast(error.message);if(data.user)await saveProfile(data.user.id,{role:"company",email,company_name,contact_name:contactName.value,phone:companyPhone.value});showToast("تم إنشاء الحساب. انتقل لتسجيل الدخول.");setTimeout(()=>location.href="login.html",1200);}catch(err){showToast(err.message||"حدث خطأ أثناء التسجيل.");}};
</script>
</body></html>
