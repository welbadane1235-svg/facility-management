<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HireX Company</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Cairo,sans-serif}
body{background:#050914;color:#fff;min-height:100vh;overflow-x:hidden}
body:before{content:"";position:fixed;inset:-30%;background:radial-gradient(circle at 80% 5%,rgba(0,198,255,.18),transparent 25%),radial-gradient(circle at 10% 90%,rgba(139,92,246,.18),transparent 25%);z-index:-1}
button,input,select,textarea{font-family:inherit}
.glass{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.25)}
.btn{border:0;border-radius:16px;padding:12px 18px;color:#fff;font-weight:800;cursor:pointer;background:rgba(255,255,255,.08);transition:.2s}
.btn:hover{transform:translateY(-2px)}.p{background:linear-gradient(135deg,#00c6ff,#0072ff)}.ok{background:rgba(34,197,94,.18);color:#86efac}.no{background:rgba(239,68,68,.18);color:#fca5a5}
input,select,textarea{border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;padding:0 14px;width:100%;outline:none}
input,select{height:52px}textarea{min-height:100px;padding-top:12px;resize:vertical}select option{color:#111}
nav{padding:16px 6%;display:flex;justify-content:space-between;align-items:center;background:rgba(5,9,20,.72);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:12px}.x{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,#00c6ff,#0072ff);display:grid;place-items:center;font-weight:900}.logo h1{font-size:27px}.logo small{color:rgba(255,255,255,.55)}
.hero{padding:60px 6%;display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:center}.hero h2{font-size:52px;line-height:1.18;margin-bottom:16px}.hero p{color:rgba(255,255,255,.65);font-size:18px;line-height:2}
.grad{background:linear-gradient(90deg,#00c6ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card,.panel{border-radius:28px;padding:20px}.form{display:grid;gap:10px}.tabs{display:flex;gap:10px;margin-bottom:12px}.tabs .btn{flex:1}
.app{display:none}.app.active{display:block}.layout{display:grid;grid-template-columns:260px 1fr;gap:18px;padding:20px}.side{border-radius:30px;padding:18px;min-height:calc(100vh - 40px);position:sticky;top:20px}.side button{width:100%;margin:6px 0;text-align:right}.side button.active{background:linear-gradient(135deg,rgba(0,198,255,.26),rgba(0,114,255,.18))}
.page{display:none}.page.active{display:block}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{border-radius:22px;padding:16px}.kpi h3{font-size:30px}.kpi p{color:rgba(255,255,255,.58)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.item{border-radius:24px;padding:18px;transition:.2s}.item:hover{background:rgba(255,255,255,.09)}.item p{color:rgba(255,255,255,.62);line-height:1.75}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.pill,.tag{display:inline-flex;padding:6px 10px;border-radius:30px;background:rgba(0,198,255,.14);color:#80e8ff;font-size:12px;margin:3px}.pending{background:rgba(245,158,11,.16);color:#fcd34d}.accepted{background:rgba(34,197,94,.16);color:#86efac}.rejected{background:rgba(239,68,68,.16);color:#fca5a5}
.toast{position:fixed;bottom:20px;left:20px;z-index:99;padding:13px 18px;border-radius:16px;background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.3);color:#86efac;display:none}.toast.err{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.3);color:#fca5a5}
.searchbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}.meta{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.meta span{padding:6px 10px;border-radius:30px;background:rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.75)}
@media(max-width:950px){.hero,.layout{grid-template-columns:1fr}.hero{padding:40px 20px}.hero h2{font-size:34px}.grid,.kpis,.fg,.searchbar{grid-template-columns:1fr}.side{position:relative;min-height:auto}nav{padding:14px 20px}}
</style></head><body><div id=toast class=toast></div><nav><div class=logo><div class=x>B</div><div><h1>HireX Company</h1><small>الشركات</small></div></div><button class="btn p" onclick=scrollLogin()>تسجيل / دخول</button></nav><main id=public><section class=hero><div><h2>لوحة الشركات <span class=grad>منفصلة بالكامل</span></h2><p>نشر وظائف، إدارة المتقدمين، مشاهدة الباحثين وإرسال دعوات.</p></div><div class="card glass" id=loginBox><div class=tabs><button class="btn p" onclick="mode='login';authUI()">دخول</button><button class=btn onclick="mode='signup';authUI()">حساب جديد</button></div><div id=auth></div></div></section></main><section id=app class=app><div class=layout><aside class="side glass"><div class=logo style="margin-bottom:18px"><div class=x>B</div><h3>شركة</h3></div><button class="btn active" onclick="page('home',this)">الرئيسية</button><button class=btn onclick="page('publish',this)">نشر وظيفة</button><button class=btn onclick="page('jobs',this)">وظائفي</button><button class=btn onclick="page('apps',this)">المتقدمين</button><button class=btn onclick="page('seekers',this)">الباحثين</button><button class=btn onclick="page('profile',this)">بيانات الشركة</button><button class="btn no" onclick=logout()>خروج</button></aside><main><div class="panel glass"><h2 id=welcome></h2><p id=sub style="color:rgba(255,255,255,.6)"></p></div><div id=page-home class="page active"><div class=kpis><div class="kpi glass"><h3 id=jc>0</h3><p>وظائفي</p></div><div class="kpi glass"><h3 id=ac>0</h3><p>متقدمين</p></div><div class="kpi glass"><h3 id=sc>0</h3><p>باحثين</p></div><div class="kpi glass"><h3 id=vc>0</h3><p>مشاهدات CV</p></div></div></div><div id=page-publish class=page><div class="panel glass"><h3>نشر وظيفة</h3><div class=fg><input id=jt placeholder=المسمى><input id=jcity placeholder=المدينة><select id=jcat></select><input id=jsal placeholder=الراتب><input id=jtype placeholder=نوع_الدوام><textarea id=jdesc class=full placeholder=الوصف></textarea><button class="btn p full" onclick=publishJob()>نشر</button></div></div></div><div id=page-jobs class=page><div class="panel glass"><h3>وظائفي</h3><div id=myJobs class=grid></div></div></div><div id=page-apps class=page><div class="panel glass"><h3>المتقدمين</h3><div id=appList></div></div></div><div id=page-seekers class=page><div class="panel glass"><h3>الباحثين</h3><div id=seekersList class=grid></div></div></div><div id=page-profile class=page><div class="panel glass"><h3>بيانات الشركة</h3><div class=fg><input id=cName placeholder=اسم_الشركة><input id=cCity placeholder=المدينة><input id=cIndustry placeholder=النشاط><textarea id=cDesc class=full placeholder=نبذة></textarea><button class="btn p full" onclick=saveCompany()>حفظ</button></div></div></div></main></div></section><script>
const db=supabase.createClient('https://odfcsexotylhsstybiju.supabase.co','sb_publishable_zJnpojEcE7O9kOfrnIt4Iw_9UGzunBH'),SITE='https://welbadane1235-svg.github.io/facility-management/';let mode='login',user=null,me=null,cats=[],jobs=[],apps=[],seekers=[],company=null;
const fall=['إدارة','مطاعم','تسويق','برمجة','سائق','مهندسين','موارد بشرية','فنيين وصيانة'].map(n=>({name:n}));function msg(t,e=0){toast.textContent=t;toast.className=e?'toast err':'toast';toast.style.display='block';setTimeout(()=>toast.style.display='none',2500)}function scrollLogin(){loginBox.scrollIntoView({behavior:'smooth'})}function authUI(){auth.innerHTML=mode==='login'?`<div class=form><input id=le placeholder=البريد><input id=lp type=password placeholder=كلمة_المرور><button class="btn p" onclick=login()>دخول</button><button class=btn onclick="mode='signup';authUI()">حساب جديد</button></div>`:`<div class=form><input id=snm placeholder=اسم_الشركة><input id=se placeholder=البريد><input id=sp type=password placeholder=كلمة_المرور><button class="btn p" onclick=signup()>إنشاء حساب شركة</button><button class=btn onclick="mode='login';authUI()">لدي حساب</button></div>`}async function signup(){let full_name=snm.value,email=se.value,password=sp.value;let {data,error}=await db.auth.signUp({email,password,options:{emailRedirectTo:SITE+'company.html',data:{full_name,role:'company'}}});if(error)return msg(error.message,1);if(data.user)await db.from('users').upsert({id:data.user.id,full_name,email,phone:email,role:'company'});msg('تم إرسال رابط التأكيد')}async function login(){let {data,error}=await db.auth.signInWithPassword({email:le.value,password:lp.value});if(error)return msg(error.message,1);user=data.user;await load();openApp()}async function loadUser(){let {data:{user:u}}=await db.auth.getUser();user=u;if(!u)return;let r=await db.from('users').select('*').eq('id',u.id).single();me=r.data||{id:u.id,full_name:u.email,role:'company'};if(!r.data)await db.from('users').upsert(me)}async function load(){await loadUser();let c=await db.from('categories').select('*').order('id');if(!c.data||!c.data.length){await db.from('categories').insert(fall);c=await db.from('categories').select('*')}cats=c.data||fall;let [j,a,s,co]=await Promise.all([db.from('jobs').select('*').order('created_at',{ascending:false}),db.from('applications').select('*').order('created_at',{ascending:false}),db.from('seekers').select('*').order('created_at',{ascending:false}),user?db.from('companies').select('*').eq('owner_id',user.id).single():{data:null}]);jobs=j.data||[];apps=a.data||[];seekers=s.data||[];company=co.data;render()}function openApp(){public.style.display='none';app.classList.add('active');welcome.textContent='مرحبًا، '+(me.full_name||'');sub.textContent='نوع الحساب: شركة';fillCompany();render()}function page(p,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.side .btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}function render(){jcat.innerHTML=cats.map(c=>`<option>${c.name}</option>`).join('');let mine=jobs.filter(j=>j.owner_id===user?.id||j.company_name===me?.full_name);jc.textContent=mine.length;ac.textContent=apps.filter(a=>mine.some(j=>j.id===a.job_id)).length;sc.textContent=seekers.length;vc.textContent=seekers.reduce((t,s)=>t+(s.cv_viewed_count||0),0);myJobs.innerHTML=mine.map(j=>`<div class="item glass"><h3>${j.title}</h3><p>${j.city} • ${j.category}</p><span class=pill>${j.applicants_count||0} متقدم</span></div>`).join('')||'<p>لا توجد وظائف</p>';appList.innerHTML=apps.filter(a=>mine.some(j=>j.id===a.job_id)||a.company_name===me?.full_name).map(appCard).join('')||'<p>لا يوجد متقدمين</p>';seekersList.innerHTML=seekers.map(s=>`<div class="item glass"><h3>${s.full_name}</h3><p>${s.title} • ${s.city}</p><p>${(s.skills||[]).join(' • ')}</p><button class="btn p" onclick="viewCv(${s.id})">مشاهدة CV</button></div>`).join('')||'<p>لا يوجد باحثين</p>'}function appCard(a){return `<div class="item glass" style="margin-top:10px"><h3>${a.applicant_name}</h3><p>${a.job_title}</p><span class="pill ${a.status}">${a.status}</span><button class="btn ok" onclick="updApp(${a.id},'accepted')">قبول</button><button class="btn no" onclick="updApp(${a.id},'rejected')">رفض</button><button class=btn onclick="updApp(${a.id},'interview')">مقابلة</button></div>`}async function updApp(id,status){let r=await db.from('applications').update({status,viewed_by_company:true}).eq('id',id);if(r.error)return msg(r.error.message,1);await load();msg('تم تحديث الطلب')}async function publishJob(){let p={owner_id:user.id,title:jt.value,company_name:me.full_name,city:jcity.value,category:jcat.value,salary:jsal.value,work_type:jtype.value,description:jdesc.value,status:'published'};let r=await db.from('jobs').insert(p);if(r.error)return msg(r.error.message,1);await load();msg('تم نشر الوظيفة')}async function viewCv(id){let s=seekers.find(x=>x.id===id);await db.from('seekers').update({cv_viewed_count:(s.cv_viewed_count||0)+1}).eq('id',id);msg('تم تسجيل مشاهدة CV')}function fillCompany(){if(company){cName.value=company.company_name||'';cCity.value=company.city||'';cIndustry.value=company.industry||'';cDesc.value=company.description||''}}async function saveCompany(){let p={owner_id:user.id,company_name:cName.value,city:cCity.value,industry:cIndustry.value,description:cDesc.value};let r=company?await db.from('companies').update(p).eq('id',company.id):await db.from('companies').insert(p);if(r.error)return msg(r.error.message,1);await load();msg('تم حفظ الشركة')}async function logout(){await db.auth.signOut();location.reload()}window.addEventListener('load',async()=>{authUI();await load();if(user)openApp()});
</script></body></html>
