<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HireX Company</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"><link rel="manifest" href="manifest.json"><style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#070b15;
  --bg2:#0b1220;
  --panel:rgba(15,23,42,.72);
  --panel2:rgba(30,41,59,.62);
  --border:rgba(148,163,184,.16);
  --text:#f8fafc;
  --muted:#94a3b8;
  --soft:#cbd5e1;
  --primary:#0ea5e9;
  --primary2:#2563eb;
  --violet:#7c3aed;
  --success:#22c55e;
  --danger:#ef4444;
  --warning:#f59e0b;
  --radius:22px;
  --shadow:0 24px 80px rgba(2,6,23,.35);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Cairo,Arial,sans-serif}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(circle at 80% 5%,rgba(14,165,233,.16),transparent 28%),
    radial-gradient(circle at 5% 90%,rgba(124,58,237,.14),transparent 28%),
    linear-gradient(145deg,#050914,#07111f 58%,#050914);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
body:before{
  content:"";
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:44px 44px;
  mask-image:linear-gradient(to bottom,black,transparent 80%);
  pointer-events:none;
  z-index:-1;
}
a{text-decoration:none;color:inherit}
button,input,select,textarea{font-family:inherit}
button{user-select:none}
input,select,textarea{
  border-radius:16px;
  border:1px solid var(--border);
  background:rgba(15,23,42,.72);
  color:var(--text);
  padding:0 15px;
  width:100%;
  outline:none;
  transition:.2s;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(14,165,233,.65);
  box-shadow:0 0 0 4px rgba(14,165,233,.12);
}
input,select{height:52px}
textarea{min-height:112px;padding-top:13px;resize:vertical}
select option{color:#0f172a;background:#fff}

.glass{
  background:linear-gradient(180deg,rgba(15,23,42,.78),rgba(15,23,42,.54));
  border:1px solid var(--border);
  backdrop-filter:blur(22px);
  box-shadow:var(--shadow);
}
.btn{
  border:0;
  border-radius:15px;
  padding:12px 18px;
  color:#fff;
  font-weight:800;
  cursor:pointer;
  background:rgba(148,163,184,.12);
  border:1px solid rgba(148,163,184,.10);
  transition:.22s ease;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn:hover{transform:translateY(-2px);background:rgba(148,163,184,.18)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.p{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  box-shadow:0 12px 28px rgba(37,99,235,.22);
}
.p:hover{background:linear-gradient(135deg,#38bdf8,#2563eb)}
.ok{background:rgba(34,197,94,.14);color:#86efac;border-color:rgba(34,197,94,.22)}
.no{background:rgba(239,68,68,.14);color:#fca5a5;border-color:rgba(239,68,68,.22)}
.warn{background:rgba(245,158,11,.14);color:#fcd34d;border-color:rgba(245,158,11,.22)}

nav{
  min-height:78px;
  padding:14px 6%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(5,9,20,.78);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(148,163,184,.11);
  position:sticky;
  top:0;
  z-index:20;
}
.logo{display:flex;align-items:center;gap:13px}
.x{
  width:48px;height:48px;border-radius:18px;
  background:linear-gradient(135deg,var(--primary),var(--primary2) 70%,var(--violet));
  display:grid;place-items:center;font-weight:900;
  box-shadow:0 18px 45px rgba(14,165,233,.22);
}
.logo h1{font-size:24px;line-height:1.1;font-weight:900;letter-spacing:-.3px}
.logo small{color:var(--muted);font-weight:600}

.hero{
  padding:78px 6% 58px;
  display:grid;
  grid-template-columns:1.08fr .92fr;
  gap:34px;
  align-items:center;
}
.hero h2{
  font-size:58px;
  line-height:1.16;
  margin-bottom:18px;
  letter-spacing:-1.2px;
  font-weight:900;
}
.hero p{color:var(--soft);font-size:18px;line-height:2;max-width:760px}
.grad{
  background:linear-gradient(90deg,#38bdf8,#2563eb,#8b5cf6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.card,.panel{
  border-radius:28px;
  padding:22px;
}
.form{display:grid;gap:12px}
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  padding:6px;
  background:rgba(2,6,23,.28);
  border-radius:20px;
  border:1px solid rgba(148,163,184,.08);
}
.tabs .btn{flex:1}

#public{display:none}
.app{display:none}
.app.active,#public.active{display:block}
.layout{
  display:grid;
  grid-template-columns:minmax(245px,280px) 1fr;
  gap:20px;
  padding:22px;
}
.side{
  border-radius:30px;
  padding:18px;
  min-height:calc(100vh - 44px);
  position:sticky;
  top:94px;
  align-self:start;
}
.side h3{font-size:18px}
.side button{
  width:100%;
  margin:6px 0;
  justify-content:flex-start;
  text-align:right;
  min-height:46px;
}
.side button.active{
  background:linear-gradient(135deg,rgba(14,165,233,.28),rgba(37,99,235,.18));
  border-color:rgba(14,165,233,.28);
  color:#e0f2fe;
}

.page{display:none;animation:fadeUp .28s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
  margin-bottom:18px;
}
.kpi{
  border-radius:24px;
  padding:18px;
  position:relative;
  overflow:hidden;
}
.kpi:before{
  content:"";
  position:absolute;inset:auto -20% -45% -20%;
  height:95px;
  background:radial-gradient(circle,rgba(14,165,233,.18),transparent 70%);
}
.kpi h3{font-size:34px;font-weight:900;letter-spacing:-.8px}
.kpi p{color:var(--muted);font-weight:700;margin-top:4px}

.grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px;
}
.item{
  border-radius:24px;
  padding:18px;
  transition:.22s ease;
  background:linear-gradient(180deg,rgba(15,23,42,.78),rgba(15,23,42,.52));
  border:1px solid var(--border);
}
.item:hover{
  transform:translateY(-4px);
  border-color:rgba(14,165,233,.24);
  box-shadow:0 22px 60px rgba(2,6,23,.30);
}
.item h3{font-size:19px;margin-bottom:6px}
.item p{color:var(--muted);line-height:1.8}

.fg{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.full{grid-column:1/-1}
.pill,.tag{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:6px 11px;
  border-radius:999px;
  background:rgba(14,165,233,.13);
  color:#7dd3fc;
  border:1px solid rgba(14,165,233,.15);
  font-size:12px;
  font-weight:800;
  margin:3px;
}
.pending{background:rgba(245,158,11,.13);color:#fde68a;border-color:rgba(245,158,11,.2)}
.accepted,.verified{background:rgba(34,197,94,.13);color:#86efac;border-color:rgba(34,197,94,.2)}
.rejected{background:rgba(239,68,68,.13);color:#fca5a5;border-color:rgba(239,68,68,.2)}
.interview,.invited{background:rgba(139,92,246,.14);color:#c4b5fd;border-color:rgba(139,92,246,.2)}

.toast{
  position:fixed;
  bottom:22px;
  left:22px;
  z-index:1000;
  padding:14px 18px;
  border-radius:18px;
  background:rgba(34,197,94,.16);
  border:1px solid rgba(34,197,94,.26);
  color:#bbf7d0;
  display:none;
  box-shadow:0 18px 50px rgba(0,0,0,.24);
}
.toast.err{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.28);color:#fecaca}

.searchbar{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
  margin:14px 0;
}
.meta{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}
.meta span{
  padding:6px 10px;
  border-radius:999px;
  background:rgba(148,163,184,.10);
  font-size:12px;
  color:var(--soft);
  font-weight:700;
}
.empty{
  border-radius:22px;
  padding:28px;
  text-align:center;
  color:var(--muted);
  background:rgba(15,23,42,.46);
  border:1px dashed rgba(148,163,184,.18);
}
#bootScreen{
  position:fixed;
  inset:0;
  z-index:999;
  background:#050914;
  display:grid;
  place-items:center;
}
.loader{
  width:54px;height:54px;border-radius:50%;
  border:4px solid rgba(255,255,255,.12);
  border-top-color:var(--primary);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:1100px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .kpis{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){
  nav{padding:12px 18px}
  .hero,.layout{grid-template-columns:1fr}
  .hero{padding:42px 20px}
  .hero h2{font-size:38px}
  .grid,.kpis,.fg,.searchbar{grid-template-columns:1fr}
  .side{position:relative;top:0;min-height:auto}
}
</style></head><body><div id="bootScreen"><div class="loader"></div></div>
<div id="toast" class="toast"></div><nav><div class="logo"><div class="x">B</div><div><h1>HireX Company</h1><small>الشركات</small></div></div><button class="btn p" onclick="scrollLogin()">تسجيل / دخول</button></nav>
<main id="public"><section class="hero"><div><h2>لوحة الشركات <span class="grad">بالكامل</span></h2><p>نشر وظائف، إدارة متقدمين، توثيق، ومتابعة.</p></div><div class="card glass" id="loginBox"><div class="tabs"><button class="btn p" onclick="mode='login';authUI()">دخول</button><button class="btn" onclick="mode='signup';authUI()">حساب جديد</button></div><div id="auth"></div></div></section></main>
<section id="app" class="app"><div class="layout"><aside class="side glass"><div class="logo" style="margin-bottom:18px"><div class="x">B</div><h3>شركة</h3></div><button class="btn active" onclick="page('home',this)">الرئيسية</button><button class="btn" onclick="page('publish',this)">نشر وظيفة</button><button class="btn" onclick="page('jobs',this)">وظائفي</button><button class="btn" onclick="page('apps',this)">المتقدمين</button><button class="btn" onclick="page('seekers',this)">الباحثين</button><button class="btn" onclick="page('profile',this)">بيانات الشركة</button><button class="btn" onclick="page('verify',this)">التوثيق</button><button class="btn no" onclick="logout()">خروج</button></aside><main>
<div class="panel glass"><h2 id="welcome"></h2><p id="sub" style="color:rgba(255,255,255,.6)"></p><div style="margin-top:8px">حالة التوثيق: <span id="topVerify" class="pill"></span></div></div>
<div id="page-home" class="page active"><div class="kpis"><div class="kpi glass"><h3 id="jc">0</h3><p>وظائفي</p></div><div class="kpi glass"><h3 id="ac">0</h3><p>متقدمين</p></div><div class="kpi glass"><h3 id="sc">0</h3><p>باحثين</p></div><div class="kpi glass"><h3 id="vc">0</h3><p>مشاهدات</p></div></div></div>
<div id="page-publish" class="page"><div class="panel glass"><h3>نشر وظيفة</h3><div class="fg"><input id="jt" placeholder="المسمى"><input id="jcity" placeholder="المدينة"><select id="jcat"></select><input id="jsal" placeholder="الراتب"><select id="jremote"><option value="onsite">حضوري</option><option value="remote">عن بعد</option><option value="hybrid">هجين</option></select><input id="jskills" placeholder="المهارات بفواصل"><textarea id="jdesc" class="full" placeholder="الوصف"></textarea><button class="btn p full" onclick="publishJob()">نشر</button></div></div></div>
<div id="page-jobs" class="page"><div class="panel glass"><h3>وظائفي</h3><div id="myJobs" class="grid"></div></div></div>
<div id="page-apps" class="page"><div class="panel glass"><h3>المتقدمين</h3><div class="searchbar"><input id="appSearch" placeholder="بحث" oninput="renderApps()"><select id="appStatus" onchange="renderApps()"><option value="">كل الحالات</option><option value="pending">قيد المراجعة</option><option value="interview">مقابلة</option><option value="accepted">مقبول</option><option value="rejected">مرفوض</option></select></div><div id="appList"></div></div></div>
<div id="page-seekers" class="page"><div class="panel glass"><h3>الباحثين</h3><div id="seekersList" class="grid"></div></div></div>
<div id="page-profile" class="page"><div class="panel glass"><h3>بيانات الشركة</h3><div class="fg"><input id="cName" placeholder="اسم الشركة"><input id="cCity" placeholder="المدينة"><input id="cIndustry" placeholder="النشاط"><input id="cLogo" type="file" accept="image/*"><textarea id="cDesc" class="full" placeholder="نبذة"></textarea><button class="btn p full" onclick="saveCompany()">حفظ</button></div></div></div>
<div id="page-verify" class="page"><div class="panel glass"><h3>توثيق الشركة</h3><div class="item glass">حالة التوثيق: <span id="verifyStatus" class="pill"></span></div><div class="fg"><input id="docName" placeholder="اسم المستند / السجل"><input id="docFile" type="file"><textarea id="docNote" class="full" placeholder="ملاحظات"></textarea><button class="btn p full" onclick="requestVerify()">إرسال طلب توثيق</button></div></div></div>
</main></div></section><script>
const SUPABASE_URL='https://odfcsexotylhsstybiju.supabase.co', SUPABASE_KEY='sb_publishable_zJnpojEcE7O9kOfrnIt4Iw_9UGzunBH', SITE='https://welbadane1235-svg.github.io/facility-management/';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
let mode='login', user=null, me=null, cats=[], jobs=[], seekers=[], apps=[], notifs=[], saved=[], company=null, interviews=[], verifications=[], users=[];
const fall=['إدارة','مطاعم','تسويق','برمجة','سائق','مهندسين','موارد بشرية','فنيين وصيانة'].map(n=>({name:n}));
function msg(t,e=false){toast.textContent=t;toast.className=e?'toast err':'toast';toast.style.display='block';setTimeout(()=>toast.style.display='none',2800)}
function empty(t){return `<div class="empty glass">${t}</div>`}
function statusLabel(s){return {pending:'قيد المراجعة',accepted:'مقبول',rejected:'مرفوض',interview:'مقابلة',invited:'دعوة مقابلة',verified:'موثق ✅',declined:'مرفوض'}[s]||s||'غير محدد'}
function verifyLabel(s){return {verified:'موثق ✅',rejected:'مرفوض ❌',pending:'قيد المراجعة ⏳',not_requested:'لم يتم طلب التوثيق'}[s]||s||'لم يتم طلب التوثيق'}
function setPageKey(app,p){localStorage.setItem('hirex_'+app+'_page',p)}
function getPageKey(app){return localStorage.getItem('hirex_'+app+'_page')||'home'}
function showPublic(){bootScreen.style.display='none';public.classList.add('active')}
function showApp(){bootScreen.style.display='none';public.classList.remove('active');app.classList.add('active')}
function scrollLogin(){document.getElementById('loginBox')?.scrollIntoView({behavior:'smooth'})}
async function uploadFile(bucket,file){if(!file)return '';const path=Date.now()+'-'+file.name.replace(/\s+/g,'-');const r=await db.storage.from(bucket).upload(path,file,{upsert:true});if(r.error){msg(r.error.message,true);return ''}return db.storage.from(bucket).getPublicUrl(path).data.publicUrl}
async function ensureCategories(){let c=await db.from('categories').select('*').order('id');if(!c.data||!c.data.length){await db.from('categories').insert(fall);c=await db.from('categories').select('*').order('id')}cats=c.data||fall}
async function loadUser(){const session=await db.auth.getSession();user=session.data.session?.user||null;if(!user)return false;let u=await db.from('users').select('*').eq('id',user.id).maybeSingle();me=u.data||{id:user.id,full_name:user.email,email:user.email,role:'candidate'};if(!u.data)await db.from('users').upsert(me);await ensureCategories();return true}
function guard(role){if(me.role&&me.role!==role&&me.role!=='admin'){document.body.innerHTML=`<div style="min-height:100vh;display:grid;place-items:center;padding:20px"><div class="panel glass"><h2>غير مصرح</h2><p>هذه البوابة مخصصة لدور آخر.</p><a class="btn p" href="index.html">العودة للرئيسية</a></div></div>`;return false}return true}

function authUI(){auth.innerHTML=mode==='login'?`<div class=form><input id=le placeholder=البريد><input id=lp type=password placeholder=كلمة_المرور><button class="btn p" onclick=login()>دخول</button><button class=btn onclick="mode='signup';authUI()">حساب جديد</button></div>`:`<div class=form><input id=snm placeholder=اسم_الشركة><input id=se placeholder=البريد><input id=sp type=password placeholder=كلمة_المرور><button class="btn p" onclick=signup()>إنشاء حساب شركة</button><button class=btn onclick="mode='login';authUI()">لدي حساب</button></div>`}
async function signup(){let r=await db.auth.signUp({email:se.value,password:sp.value,options:{emailRedirectTo:SITE+'company.html',data:{full_name:snm.value,role:'company'}}});if(r.error)return msg(r.error.message,true);if(r.data.user)await db.from('users').upsert({id:r.data.user.id,full_name:snm.value,email:se.value,role:'company'});msg('تم إرسال رابط التأكيد')}
async function login(){let r=await db.auth.signInWithPassword({email:le.value,password:lp.value});if(r.error)return msg(r.error.message,true);await boot()}
async function loadAll(){if(!await loadUser())return false;if(!guard('company'))return false;let [j,a,s,co,n]=await Promise.all([db.from('jobs').select('*').order('created_at',{ascending:false}),db.from('applications').select('*').order('created_at',{ascending:false}),db.from('seekers').select('*'),db.from('companies').select('*').eq('owner_id',user.id).maybeSingle(),db.from('notifications').select('*').eq('user_id',user.id)]);jobs=j.data||[];apps=a.data||[];seekers=s.data||[];company=co.data;notifs=n.data||[];return true}
function openApp(){showApp();welcome.textContent='مرحبًا، '+(me.full_name||user.email);sub.textContent='نوع الحساب: شركة';render();restorePage()}
function page(p,b){setPageKey('company',p);document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p)?.classList.add('active');document.querySelectorAll('.side .btn').forEach(x=>x.classList.remove('active'));b?.classList.add('active');render()}
function restorePage(){let p=getPageKey('company');let map={home:'الرئيسية',publish:'نشر',jobs:'وظائفي',apps:'المتقدمين',seekers:'الباحثين',profile:'بيانات',verify:'التوثيق'};let btn=[...document.querySelectorAll('.side .btn')].find(x=>x.textContent.includes(map[p]||'الرئيسية'));if(btn)page(p,btn)}
function myJobs(){return jobs.filter(j=>j.owner_id===user.id||j.company_name===me.full_name)}function myApps(){let m=myJobs();return apps.filter(a=>m.some(j=>j.id===a.job_id)||a.company_name===me.full_name)}
function render(){let m=myJobs(),a=myApps();jc.textContent=m.length;ac.textContent=a.length;sc.textContent=seekers.length;vc.textContent=m.reduce((t,j)=>t+(j.views_count||0),0);jcat.innerHTML=cats.map(c=>`<option>${c.name}</option>`).join('');topVerify.textContent=verifyLabel(company?.verification_status);verifyStatus.textContent=verifyLabel(company?.verification_status);renderJobs();renderApps();renderSeekers()}
function renderJobs(){let m=myJobs();myJobs.innerHTML=m.map(j=>`<div class="item glass"><h3>${j.title}</h3><p>${j.city} • ${j.category}</p><span class=pill>${j.status||'published'}</span><span class=pill>${j.applicants_count||0} متقدم</span><button class="btn warn" onclick="setJob(${j.id},'paused')">إيقاف</button><button class="btn ok" onclick="setJob(${j.id},'published')">نشر</button><button class="btn no" onclick="deleteJob(${j.id})">حذف</button></div>`).join('')||empty('لا توجد وظائف')}
async function publishJob(){let skills=jskills.value.split(',').map(x=>x.trim()).filter(Boolean);let r=await db.from('jobs').insert({owner_id:user.id,title:jt.value,company_name:me.full_name,city:jcity.value,category:jcat.value,salary:jsal.value,remote_type:jremote.value,required_skills:skills,description:jdesc.value,status:'published'});if(r.error)return msg(r.error.message,true);await boot(false);msg('تم النشر')}
async function setJob(id,status){await db.from('jobs').update({status}).eq('id',id);await boot(false);msg('تم التحديث')}async function deleteJob(id){if(confirm('حذف؟')){await db.from('jobs').delete().eq('id',id);await boot(false)}}
function renderApps(){let q=(appSearch?.value||'').toLowerCase(),st=appStatus?.value||'';let d=myApps().filter(a=>(!q||String(a.applicant_name).toLowerCase().includes(q))&&(!st||a.status===st));appList.innerHTML=d.map(a=>`<div class="item glass"><h3>${a.applicant_name}</h3><p>${a.job_title}</p><span class="pill ${a.status}">${statusLabel(a.status)}</span><textarea id="note-${a.id}" placeholder="ملاحظات HR">${a.hr_note||''}</textarea><button class="btn ok" onclick="updApp(${a.id},'accepted')">قبول</button><button class="btn no" onclick="updApp(${a.id},'rejected')">رفض</button><button class="btn" onclick="updApp(${a.id},'interview')">مقابلة</button><button class="btn" onclick="saveNote(${a.id})">حفظ الملاحظة</button></div>`).join('')||empty('لا يوجد متقدمين')}
async function updApp(id,status){await db.from('applications').update({status,viewed_by_company:true}).eq('id',id);let a=apps.find(x=>x.id===id);if(a?.applicant_user_id)await db.from('notifications').insert({user_id:a.applicant_user_id,title:'تحديث حالة طلبك',details:'الحالة الجديدة: '+statusLabel(status)});await boot(false);msg('تم تحديث الحالة')}
async function saveNote(id){await db.from('applications').update({hr_note:document.getElementById('note-'+id).value}).eq('id',id);msg('تم حفظ الملاحظة')}
function renderSeekers(){seekersList.innerHTML=seekers.map(s=>`<div class="item glass"><h3>${s.full_name}</h3><p>${s.title} • ${s.city}</p><div>${(s.skills||[]).map(x=>`<span class=tag>${x}</span>`).join('')}</div></div>`).join('')||empty('لا يوجد باحثين')}
async function saveCompany(){let logo=await uploadFile('company-logos',cLogo.files[0]);let p={owner_id:user.id,company_name:cName.value||me.full_name,city:cCity.value,industry:cIndustry.value,description:cDesc.value};if(logo)p.logo_url=logo;let r=company?await db.from('companies').update(p).eq('id',company.id):await db.from('companies').insert(p);if(r.error)return msg(r.error.message,true);await boot(false);msg('تم حفظ الشركة')}
async function requestVerify(){let doc=await uploadFile('verification-docs',docFile.files[0]);if(!company){await db.from('companies').insert({owner_id:user.id,company_name:me.full_name,verification_status:'pending'});await loadAll()}let r=await db.from('verification_requests').insert({user_id:user.id,user_role:'company',requester_name:me.full_name,document_name:docName.value,document_url:doc,note:docNote.value,status:'pending'});if(r.error)return msg(r.error.message,true);await db.from('companies').update({verification_status:'pending',commercial_doc_name:docName.value,commercial_doc_url:doc}).eq('owner_id',user.id);await boot(false);msg('تم إرسال طلب التوثيق')}
async function logout(){await db.auth.signOut();location.href='company.html'}
async function boot(open=true){let ok=await loadAll();if(!ok){showPublic();return}if(open)openApp();else render()}
window.addEventListener('load',async()=>{authUI();await boot(true);if('serviceWorker' in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{})})
</script></body></html>
