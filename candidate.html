<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HireX Candidate - Core Applications</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Cairo,sans-serif}body{background:#050914;color:#fff;min-height:100vh;overflow-x:hidden}body:before{content:"";position:fixed;inset:-30%;background:radial-gradient(circle at 80% 5%,rgba(0,198,255,.18),transparent 25%),radial-gradient(circle at 10% 90%,rgba(139,92,246,.18),transparent 25%);z-index:-1}button,input,select,textarea{font-family:inherit}.glass{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.25)}.btn{border:0;border-radius:16px;padding:12px 18px;color:#fff;font-weight:800;cursor:pointer;background:rgba(255,255,255,.08);transition:.2s}.btn:hover{transform:translateY(-2px)}.p{background:linear-gradient(135deg,#00c6ff,#0072ff)}.ok{background:rgba(34,197,94,.18);color:#86efac}.no{background:rgba(239,68,68,.18);color:#fca5a5}input,select,textarea{border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;padding:0 14px;width:100%;outline:none}input,select{height:52px}textarea{min-height:105px;padding-top:12px;resize:vertical}select option{color:#111}nav{padding:16px 6%;display:flex;justify-content:space-between;align-items:center;background:rgba(5,9,20,.72);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10}.logo{display:flex;align-items:center;gap:12px}.x{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,#00c6ff,#0072ff);display:grid;place-items:center;font-weight:900}.logo h1{font-size:27px}.logo small{color:rgba(255,255,255,.55)}.hero{padding:60px 6%;display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:center}.hero h2{font-size:52px;line-height:1.18;margin-bottom:16px}.hero p{color:rgba(255,255,255,.65);font-size:18px;line-height:2}.grad{background:linear-gradient(90deg,#00c6ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.card,.panel{border-radius:28px;padding:20px}.form{display:grid;gap:10px}.tabs{display:flex;gap:10px;margin-bottom:12px}.tabs .btn{flex:1}.app{display:none}.app.active{display:block}.layout{display:grid;grid-template-columns:260px 1fr;gap:18px;padding:20px}.side{border-radius:30px;padding:18px;min-height:calc(100vh - 40px);position:sticky;top:20px}.side button{width:100%;margin:6px 0;text-align:right}.side button.active{background:linear-gradient(135deg,rgba(0,198,255,.26),rgba(0,114,255,.18))}.page{display:none}.page.active{display:block}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{border-radius:22px;padding:16px}.kpi h3{font-size:30px}.kpi p{color:rgba(255,255,255,.58)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.item{border-radius:24px;padding:18px;transition:.2s}.item:hover{background:rgba(255,255,255,.09)}.item p{color:rgba(255,255,255,.62);line-height:1.75}.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.pill,.tag{display:inline-flex;padding:6px 10px;border-radius:30px;background:rgba(0,198,255,.14);color:#80e8ff;font-size:12px;margin:3px}.pending{background:rgba(245,158,11,.16);color:#fcd34d}.accepted{background:rgba(34,197,94,.16);color:#86efac}.rejected{background:rgba(239,68,68,.16);color:#fca5a5}.interview{background:rgba(139,92,246,.18);color:#c4b5fd}.toast{position:fixed;bottom:20px;left:20px;z-index:99;padding:13px 18px;border-radius:16px;background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.3);color:#86efac;display:none}.toast.err{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.3);color:#fca5a5}.searchbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}.meta{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.meta span{padding:6px 10px;border-radius:30px;background:rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.75)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:center;padding:18px}.modal-box{width:min(820px,100%);max-height:92vh;overflow:auto;border-radius:30px;padding:22px}.empty{border-radius:22px;padding:24px;text-align:center;color:rgba(255,255,255,.6)}.skeleton{height:110px;border-radius:24px;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.09),rgba(255,255,255,.05));animation:pulse 1.2s infinite}@keyframes pulse{50%{opacity:.45}}@media(max-width:950px){.hero,.layout{grid-template-columns:1fr}.hero{padding:40px 20px}.hero h2{font-size:34px}.grid,.kpis,.fg,.searchbar{grid-template-columns:1fr}.side{position:relative;min-height:auto}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<nav><div class="logo"><div class="x">C</div><div><h1>HireX Candidate</h1><small>الباحث عن عمل</small></div></div><button class="btn p" onclick="scrollLogin()">تسجيل / دخول</button></nav>
<main id="public"><section class="hero"><div><h2>قدّم على الوظائف <span class="grad">باحتراف</span></h2><p>تفاصيل وظيفة، رسالة تعريف، حفظ مفضلة، طلباتي، وإشعارات مباشرة.</p></div><div class="card glass" id="loginBox"><div class="tabs"><button class="btn p" onclick="mode='login';authUI()">دخول</button><button class="btn" onclick="mode='signup';authUI()">حساب جديد</button></div><div id="auth"></div></div></section></main>
<section id="app" class="app"><div class="layout"><aside class="side glass"><div class="logo" style="margin-bottom:18px"><div class="x">C</div><h3>باحث</h3></div><button class="btn active" onclick="page('home',this)">الرئيسية</button><button class="btn" onclick="page('jobs',this)">الوظائف</button><button class="btn" onclick="page('saved',this)">المفضلة</button><button class="btn" onclick="page('apps',this)">طلباتي</button><button class="btn" onclick="page('publish',this)">ملفي العام</button><button class="btn" onclick="page('notify',this)">الإشعارات</button><button class="btn no" onclick="logout()">خروج</button></aside><main>
<div class="panel glass"><h2 id="welcome"></h2><p id="sub" style="color:rgba(255,255,255,.6)"></p></div>
<div id="page-home" class="page active"><div class="kpis"><div class="kpi glass"><h3 id="jobsCount">0</h3><p>وظائف</p></div><div class="kpi glass"><h3 id="appsCount">0</h3><p>طلباتي</p></div><div class="kpi glass"><h3 id="savedCount">0</h3><p>مفضلة</p></div><div class="kpi glass"><h3 id="notifCount">0</h3><p>إشعارات</p></div></div><div class="panel glass"><h3>وظائف مناسبة</h3><div id="latestJobs" class="grid"><div class="skeleton"></div></div></div></div>
<div id="page-jobs" class="page"><div class="panel glass"><h3>الوظائف</h3><div class="searchbar"><input id="jobSearch" placeholder="بحث" oninput="renderJobs()"><input id="jobCity" placeholder="المدينة" oninput="renderJobs()"><select id="jobCat" onchange="renderJobs()"></select></div><div id="jobsGrid" class="grid"></div></div></div>
<div id="page-saved" class="page"><div class="panel glass"><h3>الوظائف المحفوظة</h3><div id="savedGrid" class="grid"></div></div></div>
<div id="page-apps" class="page"><div class="panel glass"><h3>طلباتي</h3><div id="myApps"></div></div></div>
<div id="page-publish" class="page"><div class="panel glass"><h3>ملفي العام</h3><div class="fg"><input id="sName" placeholder="الاسم"><input id="sTitle" placeholder="المسمى"><input id="sCity" placeholder="المدينة"><select id="sCat"></select><input id="sExp" placeholder="الخبرة"><input id="sSkills" placeholder="المهارات بفواصل"><textarea id="sBio" class="full" placeholder="نبذة"></textarea><button class="btn p full" onclick="saveSeeker()">حفظ الملف</button></div><div id="profileView" style="margin-top:14px"></div></div></div>
<div id="page-notify" class="page"><div class="panel glass"><h3>الإشعارات</h3><div id="notifyList"></div></div></div>
</main></div></section>
<div class="modal" id="jobModal"><div class="modal-box glass"><button class="btn no" onclick="closeJob()">إغلاق</button><div id="jobDetails" style="margin-top:14px"></div></div></div>
<div class="modal" id="applyModal"><div class="modal-box glass"><button class="btn no" onclick="closeApply()">إغلاق</button><div id="applyContent" style="margin-top:14px"></div></div></div>
<script>
const db=supabase.createClient('https://odfcsexotylhsstybiju.supabase.co','sb_publishable_zJnpojEcE7O9kOfrnIt4Iw_9UGzunBH'),SITE='https://welbadane1235-svg.github.io/facility-management/';let mode='login',user=null,me=null,cats=[],jobs=[],seekers=[],mySeeker=null,apps=[],notifs=[],saved=[],selectedJob=null;
const fall=['إدارة','مطاعم','تسويق','برمجة','سائق','مهندسين','موارد بشرية','فنيين وصيانة'].map(n=>({name:n,icon:'📌',description:n}));
function msg(t,e=0){toast.textContent=t;toast.className=e?'toast err':'toast';toast.style.display='block';setTimeout(()=>toast.style.display='none',2800)}function scrollLogin(){loginBox.scrollIntoView({behavior:'smooth'})}function authUI(){auth.innerHTML=mode==='login'?`<div class=form><input id=le placeholder=البريد><input id=lp type=password placeholder=كلمة_المرور><button class="btn p" onclick=login()>دخول</button><button class=btn onclick="mode='signup';authUI()">حساب جديد</button></div>`:`<div class=form><input id=snm placeholder=الاسم><input id=se placeholder=البريد><input id=sp type=password placeholder=كلمة_المرور><button class="btn p" onclick=signup()>إنشاء حساب باحث</button><button class=btn onclick="mode='login';authUI()">لدي حساب</button></div>`}
async function signup(){let full_name=snm.value.trim(),email=se.value.trim(),password=sp.value;if(!full_name||!email||!password)return msg('أكمل البيانات',1);let {data,error}=await db.auth.signUp({email,password,options:{emailRedirectTo:SITE+'candidate.html',data:{full_name,role:'candidate'}}});if(error)return msg(error.message,1);if(data.user)await db.from('users').upsert({id:data.user.id,full_name,email,phone:email,role:'candidate'});msg('تم إرسال رابط التأكيد للبريد')}async function login(){let {data,error}=await db.auth.signInWithPassword({email:le.value.trim(),password:lp.value});if(error)return msg(error.message,1);user=data.user;await load();openApp()}async function loadUser(){let {data:{user:u}}=await db.auth.getUser();user=u;if(!u)return;let r=await db.from('users').select('*').eq('id',u.id).single();me=r.data||{id:u.id,full_name:u.email,email:u.email,role:'candidate'};if(!r.data)await db.from('users').upsert(me)}async function load(){await loadUser();let c=await db.from('categories').select('*').order('id');if(!c.data||!c.data.length){await db.from('categories').insert(fall);c=await db.from('categories').select('*').order('id')}cats=c.data||fall;let [j,s,a,n,sv]=await Promise.all([db.from('jobs').select('*').order('created_at',{ascending:false}),db.from('seekers').select('*').order('created_at',{ascending:false}),db.from('applications').select('*').order('created_at',{ascending:false}),user?db.from('notifications').select('*').eq('user_id',user.id).order('created_at',{ascending:false}):{data:[]},user?db.from('saved_jobs').select('*').eq('user_id',user.id).order('created_at',{ascending:false}):{data:[]}]);jobs=j.data||[];seekers=s.data||[];apps=a.data||[];notifs=n.data||[];saved=sv.data||[];mySeeker=seekers.find(x=>x.owner_id===user?.id);render()}
function openApp(){public.style.display='none';app.classList.add('active');welcome.textContent='مرحبًا، '+(me.full_name||'');sub.textContent='نوع الحساب: باحث عن عمل';fillForms();render()}function page(p,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.side .btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}function render(){jobsCount.textContent=jobs.length;appsCount.textContent=myApplications().length;savedCount.textContent=saved.length;notifCount.textContent=notifs.length;let opts='<option value="">كل الأقسام</option>'+cats.map(c=>`<option>${c.name}</option>`).join('');jobCat.innerHTML=opts;sCat.innerHTML=cats.map(c=>`<option>${c.name}</option>`).join('');latestJobs.innerHTML=jobs.slice(0,6).map(jobCard).join('')||empty('لا توجد وظائف');renderJobs();renderSaved();renderApps();renderNotifs();renderProfile()}
function empty(t){return `<div class="empty glass">${t}</div>`}function myApplications(){return apps.filter(a=>a.applicant_user_id===user?.id)}function renderJobs(){let q=(jobSearch?.value||'').toLowerCase(),city=(jobCity?.value||'').toLowerCase(),cat=jobCat?.value||'';let d=jobs.filter(j=>(!q||String(j.title).toLowerCase().includes(q)||String(j.company_name).toLowerCase().includes(q))&&(!city||String(j.city).toLowerCase().includes(city))&&(!cat||j.category===cat));jobsGrid.innerHTML=d.map(jobCard).join('')||empty('لا توجد نتائج')}function jobCard(j){let isSaved=saved.some(s=>s.job_id===j.id),applied=apps.some(a=>a.job_id===j.id&&a.applicant_user_id===user?.id);return `<div class="item glass"><h3>${j.title||''}</h3><p>${j.company_name||''}</p><div class=meta><span>${j.city||''}</span><span>${j.work_type||''}</span><span>${j.category||''}</span><span>${j.is_urgent?'عاجلة':'مفتوحة'}</span></div><p>${j.description||''}</p><span class=pill>${j.applicants_count||0} متقدم</span><div style="margin-top:10px"><button class="btn p" onclick="openJob(${j.id})">التفاصيل</button><button class="btn" onclick="saveJob(${j.id})">${isSaved?'محفوظة ❤️':'حفظ 🤍'}</button><button class="btn ok" onclick="openApply(${j.id})" ${applied?'disabled':''}>${applied?'تم التقديم':'تقديم الآن'}</button></div></div>`}
async function openJob(id){selectedJob=jobs.find(x=>x.id===id);if(!selectedJob)return;await db.from('jobs').update({views_count:(selectedJob.views_count||0)+1}).eq('id',id);jobDetails.innerHTML=`<h2>${selectedJob.title}</h2><p>${selectedJob.company_name} • ${selectedJob.city}</p><div class=meta><span>${selectedJob.salary||'حسب الاتفاق'}</span><span>${selectedJob.work_type||''}</span><span>${selectedJob.experience_required||''}</span><span>${selectedJob.status||'published'}</span></div><p style="margin:14px 0">${selectedJob.description||''}</p><h3>المهارات المطلوبة</h3><div>${(selectedJob.required_skills||[]).map(x=>`<span class=tag>${x}</span>`).join('')||'<span class=tag>غير محدد</span>'}</div><div style="margin-top:14px"><button class="btn p" onclick="openApply(${selectedJob.id})">تقديم الآن</button><button class="btn" onclick="saveJob(${selectedJob.id})">حفظ الوظيفة</button></div>`;jobModal.style.display='flex'}function closeJob(){jobModal.style.display='none'}function openApply(id){selectedJob=jobs.find(x=>x.id===id);if(!selectedJob)return;if(apps.some(a=>a.job_id===id&&a.applicant_user_id===user?.id))return msg('قدمت على هذه الوظيفة من قبل',1);applyContent.innerHTML=`<h2>تقديم على: ${selectedJob.title}</h2><p>${selectedJob.company_name}</p><textarea id=coverMsg placeholder="اكتب رسالة تعريف قصيرة للشركة"></textarea><button class="btn p" onclick="submitApplication()">إرسال الطلب</button>`;applyModal.style.display='flex'}function closeApply(){applyModal.style.display='none'}
async function submitApplication(){let j=selectedJob;if(!j)return;let exists=apps.some(a=>a.job_id===j.id&&a.applicant_user_id===user.id);if(exists)return msg('قدمت من قبل',1);let r=await db.from('applications').insert({job_id:j.id,applicant_user_id:user.id,applicant_name:me.full_name,job_title:j.title,company_name:j.company_name,status:'pending',cover_message:coverMsg.value,note:'تقديم من HireX'});if(r.error)return msg(r.error.message,1);await db.from('jobs').update({applicants_count:(j.applicants_count||0)+1}).eq('id',j.id);await db.from('notifications').insert({user_id:user.id,title:'تم التقديم',details:'تم إرسال طلبك على '+j.title});closeApply();closeJob();await load();msg('تم إرسال الطلب بنجاح')}
async function saveJob(id){let j=jobs.find(x=>x.id===id);if(!j)return;if(saved.some(s=>s.job_id===id))return msg('الوظيفة محفوظة مسبقًا');let r=await db.from('saved_jobs').insert({user_id:user.id,job_id:id,job_title:j.title,company_name:j.company_name});if(r.error)return msg(r.error.message,1);await load();msg('تم حفظ الوظيفة')}function renderSaved(){savedGrid.innerHTML=saved.length?saved.map(s=>`<div class="item glass"><h3>${s.job_title}</h3><p>${s.company_name}</p><button class="btn p" onclick="openJob(${s.job_id})">فتح الوظيفة</button></div>`).join(''):empty('لا توجد وظائف محفوظة')}function renderApps(){let d=myApplications();myApps.innerHTML=d.length?d.map(a=>`<div class="item glass" style="margin-top:10px"><h3>${a.job_title}</h3><p>${a.company_name}</p><span class="pill ${a.status}">${statusAr(a.status)}</span><span class=pill>${a.viewed_by_company?'تمت المشاهدة':'لم تتم المشاهدة'}</span><span class=pill>${a.cv_downloaded?'تم تحميل CV':'لم يحمل CV'}</span><p>${a.cover_message||''}</p></div>`).join(''):empty('لم تقدم على وظائف بعد')}function statusAr(s){return {pending:'قيد المراجعة',accepted:'مقبول',rejected:'مرفوض',interview:'مقابلة'}[s]||s}function renderNotifs(){notifyList.innerHTML=notifs.length?notifs.map(n=>`<div class="item glass"><h3>${n.title}</h3><p>${n.details}</p></div>`).join(''):empty('لا توجد إشعارات')}function renderProfile(){profileView.innerHTML=mySeeker?`<div class="item glass"><h2>${mySeeker.full_name}</h2><p>${mySeeker.title} • ${mySeeker.city}</p><p>${mySeeker.bio||''}</p><div>${(mySeeker.skills||[]).map(x=>`<span class=tag>${x}</span>`).join('')}</div></div>`:empty('لم تنشر ملفك بعد')}function fillForms(){if(mySeeker){sName.value=mySeeker.full_name||'';sTitle.value=mySeeker.title||'';sCity.value=mySeeker.city||'';sExp.value=mySeeker.experience||'';sSkills.value=(mySeeker.skills||[]).join(', ');sBio.value=mySeeker.bio||''}}async function saveSeeker(){let p={owner_id:user.id,full_name:sName.value||me.full_name,title:sTitle.value,city:sCity.value,category:sCat.value,experience:sExp.value,skills:sSkills.value.split(',').map(x=>x.trim()).filter(Boolean),bio:sBio.value};let r=mySeeker?await db.from('seekers').update(p).eq('id',mySeeker.id):await db.from('seekers').insert(p);if(r.error)return msg(r.error.message,1);await load();msg('تم حفظ الملف')}async function logout(){await db.auth.signOut();location.reload()}window.addEventListener('load',async()=>{authUI();await load();if(user)openApp()});
</script></body></html>
