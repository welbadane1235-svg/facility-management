<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HireX Candidate</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"><link rel="manifest" href="manifest.json"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Cairo,Arial,sans-serif}
body{background:#050914;color:#fff;min-height:100vh;overflow-x:hidden}
body:before{content:"";position:fixed;inset:-35%;background:radial-gradient(circle at 80% 8%,rgba(0,198,255,.18),transparent 24%),radial-gradient(circle at 10% 92%,rgba(139,92,246,.18),transparent 25%);z-index:-1}
a{text-decoration:none;color:#fff}button,input,select,textarea{font-family:inherit}
.glass{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.25)}
.btn{border:0;border-radius:16px;padding:12px 18px;color:#fff;font-weight:800;cursor:pointer;background:rgba(255,255,255,.08);transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.p{background:linear-gradient(135deg,#00c6ff,#0072ff)}.ok{background:rgba(34,197,94,.18);color:#86efac}.no{background:rgba(239,68,68,.18);color:#fca5a5}.warn{background:rgba(245,158,11,.18);color:#fcd34d}
input,select,textarea{border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;padding:0 14px;width:100%;outline:none}
input,select{height:52px}textarea{min-height:105px;padding-top:12px;resize:vertical}select option{color:#111}
nav{padding:16px 6%;display:flex;justify-content:space-between;align-items:center;background:rgba(5,9,20,.72);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:12px}.x{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,#00c6ff,#0072ff);display:grid;place-items:center;font-weight:900}.logo h1{font-size:27px}.logo small{color:rgba(255,255,255,.55)}
.hero{padding:60px 6%;display:grid;grid-template-columns:1.08fr .92fr;gap:24px;align-items:center}.hero h2{font-size:52px;line-height:1.18;margin-bottom:16px}.hero p{color:rgba(255,255,255,.65);font-size:18px;line-height:2}
.grad{background:linear-gradient(90deg,#00c6ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card,.panel{border-radius:28px;padding:20px}.form{display:grid;gap:10px}.tabs{display:flex;gap:10px;margin-bottom:12px}.tabs .btn{flex:1}
.app{display:none}.app.active{display:block}.layout{display:grid;grid-template-columns:270px 1fr;gap:18px;padding:20px}.side{border-radius:30px;padding:18px;min-height:calc(100vh - 40px);position:sticky;top:20px}.side button{width:100%;margin:6px 0;text-align:right}.side button.active{background:linear-gradient(135deg,rgba(0,198,255,.26),rgba(0,114,255,.18))}
.page{display:none}.page.active{display:block}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{border-radius:22px;padding:16px}.kpi h3{font-size:30px}.kpi p{color:rgba(255,255,255,.58)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.item{border-radius:24px;padding:18px;transition:.2s}.item:hover{background:rgba(255,255,255,.09);transform:translateY(-3px)}.item p{color:rgba(255,255,255,.62);line-height:1.75}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.pill,.tag{display:inline-flex;padding:6px 10px;border-radius:30px;background:rgba(0,198,255,.14);color:#80e8ff;font-size:12px;margin:3px}.pending{background:rgba(245,158,11,.16);color:#fcd34d}.accepted{background:rgba(34,197,94,.16);color:#86efac}.rejected{background:rgba(239,68,68,.16);color:#fca5a5}.interview,.invited{background:rgba(139,92,246,.18);color:#c4b5fd}.verified{background:rgba(34,197,94,.16);color:#86efac}
.toast{position:fixed;bottom:20px;left:20px;z-index:99;padding:13px 18px;border-radius:16px;background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.3);color:#86efac;display:none}.toast.err{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.3);color:#fca5a5}
.searchbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}.meta{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.meta span{padding:6px 10px;border-radius:30px;background:rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.75)}
.match,.bar{height:10px;border-radius:30px;background:rgba(255,255,255,.08);overflow:hidden;margin:8px 0}.match span,.bar span{display:block;height:100%;background:linear-gradient(90deg,#00c6ff,#8b5cf6)}
.empty{border-radius:22px;padding:24px;text-align:center;color:rgba(255,255,255,.6)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);z-index:100;display:none;align-items:center;justify-content:center;padding:18px}.modal-box{width:min(900px,100%);max-height:92vh;overflow:auto;border-radius:30px;padding:22px}
@media(max-width:950px){.hero,.layout{grid-template-columns:1fr}.hero{padding:40px 20px}.hero h2{font-size:34px}.grid,.kpis,.fg,.searchbar{grid-template-columns:1fr}.side{position:relative;min-height:auto}}
</style></head><body>
<div id="toast" class="toast"></div><nav><div class="logo"><div class="x">C</div><div><h1>HireX Candidate</h1><small>الباحث</small></div></div><button class="btn p" onclick="scrollLogin()">تسجيل / دخول</button></nav>
<main id="public"><section class="hero"><div><h2>ملفك المهني <span class="grad">واحد</span></h2><p>قدّم على الوظائف وتابع طلباتك.</p></div><div class="card glass" id="loginBox"><div class="tabs"><button class="btn p" onclick="mode='login';authUI()">دخول</button><button class="btn" onclick="mode='signup';authUI()">حساب جديد</button></div><div id="auth"></div></div></section></main>
<section id="app" class="app"><div class="layout"><aside class="side glass"><div class="logo" style="margin-bottom:18px"><div class="x">C</div><h3>باحث</h3></div><button class="btn active" onclick="page('home',this)">الرئيسية</button><button class="btn" onclick="page('jobs',this)">الوظائف</button><button class="btn" onclick="page('saved',this)">المفضلة</button><button class="btn" onclick="page('apps',this)">طلباتي</button><button class="btn" onclick="page('profile',this)">ملفي العام</button><button class="btn" onclick="page('notify',this)">الإشعارات</button><button class="btn no" onclick="logout()">خروج</button></aside><main>
<div class="panel glass"><h2 id="welcome"></h2><p id="sub" style="color:rgba(255,255,255,.6)"></p></div>
<div id="page-home" class="page active"><div class="kpis"><div class="kpi glass"><h3 id="jobsCount">0</h3><p>وظائف</p></div><div class="kpi glass"><h3 id="appsCount">0</h3><p>طلباتي</p></div><div class="kpi glass"><h3 id="savedCount">0</h3><p>مفضلة</p></div><div class="kpi glass"><h3 id="notifCount">0</h3><p>إشعارات</p></div></div><div class="panel glass"><h3>آخر الوظائف</h3><div id="latestJobs" class="grid"></div></div></div>
<div id="page-jobs" class="page"><div class="panel glass"><h3>الوظائف</h3><div class="searchbar"><input id="jobSearch" placeholder="بحث" oninput="renderJobs()"><input id="jobCity" placeholder="المدينة" oninput="renderJobs()"><select id="jobCat" onchange="renderJobs()"></select><select id="jobType" onchange="renderJobs()"><option value="">كل الأنواع</option><option value="onsite">حضوري</option><option value="remote">عن بعد</option><option value="hybrid">هجين</option></select></div><div id="jobsGrid" class="grid"></div></div></div>
<div id="page-saved" class="page"><div class="panel glass"><h3>المفضلة</h3><div id="savedGrid" class="grid"></div></div></div>
<div id="page-apps" class="page"><div class="panel glass"><h3>طلباتي</h3><div id="myApps"></div></div></div>
<div id="page-profile" class="page"><div class="panel glass"><h3>ملفي العام</h3><div class="fg"><input id="sName" placeholder="الاسم"><input id="sTitle" placeholder="المسمى"><input id="sCity" placeholder="المدينة"><select id="sCat"></select><input id="sSkills" placeholder="المهارات بفواصل"><input id="sCv" type="file" accept="application/pdf"><textarea id="sBio" class="full" placeholder="نبذة"></textarea><button class="btn p full" onclick="saveProfile()">حفظ الملف</button></div><div id="profileView" style="margin-top:14px"></div></div></div>
<div id="page-notify" class="page"><div class="panel glass"><h3>الإشعارات</h3><div id="notifyList"></div></div></div>
</main></div></section>
<script>
const SUPABASE_URL='https://odfcsexotylhsstybiju.supabase.co';
const SUPABASE_KEY='sb_publishable_zJnpojEcE7O9kOfrnIt4Iw_9UGzunBH';
const SITE='https://welbadane1235-svg.github.io/facility-management/';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true}});
let mode='login', user=null, me=null, cats=[], jobs=[], seekers=[], apps=[], notifs=[], saved=[], company=null, interviews=[], verifications=[];
const fall=['إدارة','مطاعم','تسويق','برمجة','سائق','مهندسين','موارد بشرية','فنيين وصيانة'].map(n=>({name:n}));
function msg(t,e=false){toast.textContent=t;toast.className=e?'toast err':'toast';toast.style.display='block';setTimeout(()=>toast.style.display='none',2600)}
function empty(t){return `<div class="empty glass">${t}</div>`}
function setPageKey(app,p){localStorage.setItem('hirex_'+app+'_page',p)}
function getPageKey(app){return localStorage.getItem('hirex_'+app+'_page')||'home'}
function statusLabel(s){return {pending:'قيد المراجعة',accepted:'مقبول',rejected:'مرفوض',interview:'مقابلة',verified:'موثق ✅',pending_verification:'قيد المراجعة ⏳',not_requested:'لم يتم طلب التوثيق',invited:'دعوة مقابلة',declined:'مرفوض'}[s]||s||'غير محدد'}
function verifyLabel(s){return {verified:'موثق ✅',rejected:'مرفوض ❌',pending:'قيد المراجعة ⏳',not_requested:'لم يتم طلب التوثيق'}[s]||s||'لم يتم طلب التوثيق'}
function scrollLogin(){document.getElementById('loginBox')?.scrollIntoView({behavior:'smooth'})}
async function uploadFile(bucket,file){if(!file)return '';const path=Date.now()+'-'+file.name.replace(/\s+/g,'-');const r=await db.storage.from(bucket).upload(path,file,{upsert:true});if(r.error){msg(r.error.message,true);return ''}return db.storage.from(bucket).getPublicUrl(path).data.publicUrl}
async function ensureCategories(){let c=await db.from('categories').select('*').order('id');if(!c.data||!c.data.length){await db.from('categories').insert(fall);c=await db.from('categories').select('*').order('id')}cats=c.data||fall}
async function loadBase(){const res=await db.auth.getUser();user=res.data.user;if(!user)return false;let u=await db.from('users').select('*').eq('id',user.id).single();me=u.data||{id:user.id,full_name:user.email,email:user.email,role:'candidate'};if(!u.data)await db.from('users').upsert(me);await ensureCategories();return true}
function guard(role){if(!me)return true;if(me.role&&me.role!==role&&me.role!=='admin'){document.body.innerHTML=`<div style="min-height:100vh;display:grid;place-items:center;padding:20px"><div class="panel glass"><h2>غير مصرح</h2><p>هذه البوابة مخصصة لدور آخر.</p><a class="btn p" href="index.html">العودة للرئيسية</a></div></div>`;return false}return true}

let mySeeker=null;
function authUI(){auth.innerHTML=mode==='login'?`<div class=form><input id=le placeholder=البريد><input id=lp type=password placeholder=كلمة_المرور><button class="btn p" onclick=login()>دخول</button><button class=btn onclick="mode='signup';authUI()">حساب جديد</button></div>`:`<div class=form><input id=snm placeholder=الاسم><input id=se placeholder=البريد><input id=sp type=password placeholder=كلمة_المرور><button class="btn p" onclick=signup()>إنشاء حساب باحث</button><button class=btn onclick="mode='login';authUI()">لدي حساب</button></div>`}
async function signup(){let r=await db.auth.signUp({email:se.value,password:sp.value,options:{emailRedirectTo:SITE+'candidate.html',data:{full_name:snm.value,role:'candidate'}}});if(r.error)return msg(r.error.message,true);if(r.data.user)await db.from('users').upsert({id:r.data.user.id,full_name:snm.value,email:se.value,role:'candidate'});msg('تم إرسال رابط التأكيد')}
async function login(){let r=await db.auth.signInWithPassword({email:le.value,password:lp.value});if(r.error)return msg(r.error.message,true);await boot()}
async function loadAll(){if(!await loadBase())return false;if(!guard('candidate'))return false;let [j,s,a,n,sv]=await Promise.all([db.from('jobs').select('*').order('created_at',{ascending:false}),db.from('seekers').select('*'),db.from('applications').select('*').order('created_at',{ascending:false}),db.from('notifications').select('*').eq('user_id',user.id).order('created_at',{ascending:false}),db.from('saved_jobs').select('*').eq('user_id',user.id)]);jobs=j.data||[];seekers=s.data||[];apps=a.data||[];notifs=n.data||[];saved=sv.data||[];mySeeker=seekers.find(x=>x.owner_id===user.id);return true}
function openApp(){public.style.display='none';app.classList.add('active');welcome.textContent='مرحبًا، '+(me.full_name||user.email);sub.textContent='نوع الحساب: باحث';render();restorePage()}
function page(p,b){setPageKey('candidate',p);document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.side .btn').forEach(x=>x.classList.remove('active'));b?.classList.add('active');render()}
function restorePage(){let p=getPageKey('candidate');let btn=[...document.querySelectorAll('.side .btn')].find(x=>x.textContent.includes({home:'الرئيسية',jobs:'الوظائف',saved:'المفضلة',apps:'طلباتي',profile:'ملفي',notify:'الإشعارات'}[p]||'الرئيسية'));if(btn)page(p,btn)}
function render(){jobsCount.textContent=jobs.length;appsCount.textContent=apps.filter(a=>a.applicant_user_id===user.id).length;savedCount.textContent=saved.length;notifCount.textContent=notifs.length;jobCat.innerHTML='<option value="">كل الأقسام</option>'+cats.map(c=>`<option>${c.name}</option>`).join('');sCat.innerHTML=cats.map(c=>`<option>${c.name}</option>`).join('');latestJobs.innerHTML=jobs.slice(0,6).map(jobCard).join('')||empty('لا توجد وظائف');renderJobs();renderSaved();renderApps();renderProfile();renderNotifs()}
function jobCard(j){let applied=apps.some(a=>a.job_id===j.id&&a.applicant_user_id===user.id);return `<div class="item glass"><h3>${j.title||''}</h3><p>${j.company_name||''}</p><div class=meta><span>${j.city||''}</span><span>${j.category||''}</span><span>${j.remote_type||''}</span></div><p>${j.description||''}</p><button class="btn p" onclick="applyJob(${j.id})" ${applied?'disabled':''}>${applied?'تم التقديم':'تقديم'}</button><button class="btn" onclick="saveJob(${j.id})">حفظ</button></div>`}
function renderJobs(){let q=(jobSearch?.value||'').toLowerCase(),city=(jobCity?.value||'').toLowerCase(),cat=jobCat?.value||'',type=jobType?.value||'';let d=jobs.filter(j=>(!q||String(j.title).toLowerCase().includes(q)||String(j.company_name).toLowerCase().includes(q))&&(!city||String(j.city||'').toLowerCase().includes(city))&&(!cat||j.category===cat)&&(!type||j.remote_type===type));jobsGrid.innerHTML=d.map(jobCard).join('')||empty('لا توجد نتائج')}
async function applyJob(id){let j=jobs.find(x=>x.id===id);let r=await db.from('applications').insert({job_id:id,applicant_user_id:user.id,applicant_name:me.full_name,job_title:j.title,company_name:j.company_name,status:'pending'});if(r.error)return msg(r.error.message,true);await db.from('jobs').update({applicants_count:(j.applicants_count||0)+1}).eq('id',id);await db.from('notifications').insert({user_id:user.id,title:'تم التقديم',details:'تم إرسال طلبك على '+j.title});await boot(false);msg('تم التقديم')}
async function saveJob(id){let j=jobs.find(x=>x.id===id);if(saved.some(s=>s.job_id===id))return msg('محفوظة مسبقًا');await db.from('saved_jobs').insert({user_id:user.id,job_id:id,job_title:j.title,company_name:j.company_name});await boot(false);msg('تم الحفظ')}
function renderSaved(){savedGrid.innerHTML=saved.map(s=>`<div class="item glass"><h3>${s.job_title}</h3><p>${s.company_name}</p></div>`).join('')||empty('لا توجد وظائف محفوظة')}
function renderApps(){let d=apps.filter(a=>a.applicant_user_id===user.id);myApps.innerHTML=d.map(a=>`<div class="item glass" style="margin-top:10px"><h3>${a.job_title}</h3><p>${a.company_name}</p><span class="pill ${a.status}">${statusLabel(a.status)}</span></div>`).join('')||empty('لا توجد طلبات')}
function renderProfile(){profileView.innerHTML=mySeeker?`<div class="item glass"><h3>${mySeeker.full_name}</h3><p>${mySeeker.title} • ${mySeeker.city}</p><p>${mySeeker.bio||''}</p><p>CV: ${mySeeker.cv_url?'<a class="btn p" target="_blank" href="'+mySeeker.cv_url+'">فتح CV</a>':'غير مرفق'}</p></div>`:empty('لم تنشر ملفك بعد')}
function renderNotifs(){notifyList.innerHTML=notifs.map(n=>`<div class="item glass"><h3>${n.title}</h3><p>${n.details}</p></div>`).join('')||empty('لا توجد إشعارات')}
async function saveProfile(){let cv=await uploadFile('candidate-cvs',sCv.files[0]);let p={owner_id:user.id,full_name:sName.value||me.full_name,title:sTitle.value,city:sCity.value,category:sCat.value,skills:sSkills.value.split(',').map(x=>x.trim()).filter(Boolean),bio:sBio.value};if(cv)p.cv_url=cv;let r=mySeeker?await db.from('seekers').update(p).eq('id',mySeeker.id):await db.from('seekers').insert(p);if(r.error)return msg(r.error.message,true);await boot(false);msg('تم حفظ الملف')}
async function logout(){await db.auth.signOut();location.href='candidate.html'}
async function boot(open=true){let ok=await loadAll();if(ok&&open)openApp();else if(ok)render()}
window.addEventListener('load',async()=>{authUI();await boot(true);if('serviceWorker' in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{})})
</script></body></html>
