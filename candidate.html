<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HireX Candidate</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Cairo,sans-serif}
body{background:#050914;color:#fff;min-height:100vh;overflow-x:hidden}
body:before{content:"";position:fixed;inset:-30%;background:radial-gradient(circle at 80% 5%,rgba(0,198,255,.18),transparent 25%),radial-gradient(circle at 10% 90%,rgba(139,92,246,.18),transparent 25%);z-index:-1}
button,input,select,textarea{font-family:inherit}
.glass{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(22px);box-shadow:0 20px 70px rgba(0,0,0,.25)}
.btn{border:0;border-radius:16px;padding:12px 18px;color:#fff;font-weight:800;cursor:pointer;background:rgba(255,255,255,.08);transition:.2s}
.btn:hover{transform:translateY(-2px)}.p{background:linear-gradient(135deg,#00c6ff,#0072ff)}.ok{background:rgba(34,197,94,.18);color:#86efac}.no{background:rgba(239,68,68,.18);color:#fca5a5}
input,select,textarea{border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;padding:0 14px;width:100%;outline:none}
input,select{height:52px}textarea{min-height:100px;padding-top:12px;resize:vertical}select option{color:#111}
nav{padding:16px 6%;display:flex;justify-content:space-between;align-items:center;background:rgba(5,9,20,.72);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;z-index:10}
.logo{display:flex;align-items:center;gap:12px}.x{width:46px;height:46px;border-radius:17px;background:linear-gradient(135deg,#00c6ff,#0072ff);display:grid;place-items:center;font-weight:900}.logo h1{font-size:27px}.logo small{color:rgba(255,255,255,.55)}
.hero{padding:60px 6%;display:grid;grid-template-columns:1.1fr .9fr;gap:24px;align-items:center}.hero h2{font-size:52px;line-height:1.18;margin-bottom:16px}.hero p{color:rgba(255,255,255,.65);font-size:18px;line-height:2}
.grad{background:linear-gradient(90deg,#00c6ff,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card,.panel{border-radius:28px;padding:20px}.form{display:grid;gap:10px}.tabs{display:flex;gap:10px;margin-bottom:12px}.tabs .btn{flex:1}
.app{display:none}.app.active{display:block}.layout{display:grid;grid-template-columns:260px 1fr;gap:18px;padding:20px}.side{border-radius:30px;padding:18px;min-height:calc(100vh - 40px);position:sticky;top:20px}.side button{width:100%;margin:6px 0;text-align:right}.side button.active{background:linear-gradient(135deg,rgba(0,198,255,.26),rgba(0,114,255,.18))}
.page{display:none}.page.active{display:block}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{border-radius:22px;padding:16px}.kpi h3{font-size:30px}.kpi p{color:rgba(255,255,255,.58)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.item{border-radius:24px;padding:18px;transition:.2s}.item:hover{background:rgba(255,255,255,.09)}.item p{color:rgba(255,255,255,.62);line-height:1.75}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.full{grid-column:1/-1}.pill,.tag{display:inline-flex;padding:6px 10px;border-radius:30px;background:rgba(0,198,255,.14);color:#80e8ff;font-size:12px;margin:3px}.pending{background:rgba(245,158,11,.16);color:#fcd34d}.accepted{background:rgba(34,197,94,.16);color:#86efac}.rejected{background:rgba(239,68,68,.16);color:#fca5a5}
.toast{position:fixed;bottom:20px;left:20px;z-index:99;padding:13px 18px;border-radius:16px;background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.3);color:#86efac;display:none}.toast.err{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.3);color:#fca5a5}
.searchbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}.meta{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.meta span{padding:6px 10px;border-radius:30px;background:rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.75)}
@media(max-width:950px){.hero,.layout{grid-template-columns:1fr}.hero{padding:40px 20px}.hero h2{font-size:34px}.grid,.kpis,.fg,.searchbar{grid-template-columns:1fr}.side{position:relative;min-height:auto}nav{padding:14px 20px}}
</style></head><body>
<div id="toast" class="toast"></div><nav><div class="logo"><div class="x">C</div><div><h1>HireX Candidate</h1><small>باحث عن عمل</small></div></div><button class="btn p" onclick="scrollLogin()">تسجيل / دخول</button></nav>
<main id="public"><section class="hero"><div><h2>حساب الباحث <span class="grad">مكتمل ومنفصل</span></h2><p>وظائف، طلباتي، ملفي العام، النشر، البيانات الشخصية والإشعارات.</p></div><div class="card glass" id="loginBox"><div class="tabs"><button class="btn p" onclick="mode='login';authUI()">دخول</button><button class="btn" onclick="mode='signup';authUI()">حساب جديد</button></div><div id="auth"></div></div></section></main>
<section id="app" class="app"><div class="layout"><aside class="side glass"><div class="logo" style="margin-bottom:18px"><div class="x">C</div><h3>باحث</h3></div><button class="btn active" onclick="page('home',this)">الرئيسية</button><button class="btn" onclick="page('jobs',this)">الوظائف</button><button class="btn" onclick="page('profile',this)">ملفي العام</button><button class="btn" onclick="page('apps',this)">طلباتي</button><button class="btn" onclick="page('publish',this)">النشر</button><button class="btn" onclick="page('settings',this)">البيانات الشخصية</button><button class="btn" onclick="page('notify',this)">الإشعارات</button><button class="btn no" onclick="logout()">خروج</button></aside><main>
<div class="panel glass"><h2 id="welcome"></h2><p id="sub" style="color:rgba(255,255,255,.6)"></p></div>
<div id="page-home" class="page active"><div class="kpis"><div class="kpi glass"><h3 id="jobsCount">0</h3><p>وظائف</p></div><div class="kpi glass"><h3 id="appsCount">0</h3><p>طلباتي</p></div><div class="kpi glass"><h3 id="viewsCount">0</h3><p>مشاهدات CV</p></div><div class="kpi glass"><h3 id="notifCount">0</h3><p>إشعارات</p></div></div><div class="panel glass"><h3>آخر الوظائف المناسبة</h3><div id="latestJobs" class="grid"></div></div></div>
<div id="page-jobs" class="page"><div class="panel glass"><h3>الوظائف</h3><div class="searchbar"><input id="jobSearch" placeholder="بحث" oninput="renderJobs()"><input id="jobCity" placeholder="المدينة" oninput="renderJobs()"><select id="jobCat" onchange="renderJobs()"></select></div><div id="jobsGrid" class="grid"></div></div></div>
<div id="page-profile" class="page"><div class="panel glass"><h3>ملفي العام</h3><div id="publicProfile"></div></div></div>
<div id="page-apps" class="page"><div class="panel glass"><h3>طلباتي</h3><div id="myApps"></div></div></div>
<div id="page-publish" class="page"><div class="panel glass"><h3>حفظ / تعديل منشور الباحث</h3><div class="fg"><input id="sName" placeholder="الاسم"><input id="sTitle" placeholder="المسمى"><input id="sCity" placeholder="المدينة"><select id="sCat"></select><input id="sExp" placeholder="الخبرة"><select id="sLevel"><option>Junior</option><option>Mid</option><option>Senior</option><option>Expert</option></select><input id="sSkills" placeholder="المهارات بفواصل"><select id="sPref"><option>دوام كامل</option><option>دوام جزئي</option><option>عمل حر</option><option>تدريب</option></select><textarea id="sBio" class="full" placeholder="نبذة"></textarea><textarea id="sPortfolio" class="full" placeholder="معرض أعمال/شهادات كل عنصر في سطر"></textarea><input id="sImg" type="file" accept="image/*"><input id="sCv" type="file" accept="application/pdf"><button class="btn p full" onclick="saveSeeker()">حفظ المنشور</button></div></div></div>
<div id="page-settings" class="page"><div class="panel glass"><h3>البيانات الشخصية</h3><div class="fg"><input id="uName" placeholder="الاسم"><input id="uMobile" placeholder="الجوال"><input id="uEmail" placeholder="الإيميل"><input disabled value="باحث عن عمل"><button class="btn p full" onclick="saveUser()">حفظ</button></div></div></div>
<div id="page-notify" class="page"><div class="panel glass"><h3>الإشعارات</h3><div id="notifyList"></div></div></div>
</main></div></section>
<script>
const db=supabase.createClient('https://odfcsexotylhsstybiju.supabase.co','sb_publishable_zJnpojEcE7O9kOfrnIt4Iw_9UGzunBH'),SITE='https://welbadane1235-svg.github.io/facility-management/';let mode='login',user=null,me=null,cats=[],jobs=[],seekers=[],mySeeker=null,apps=[],notifs=[];
const fall=['إدارة','مطاعم','تسويق','برمجة','سائق','مهندسين','موارد بشرية','فنيين وصيانة'].map((n,i)=>({name:n,icon:'📌',description:n}));
function msg(t,e=0){toast.textContent=t;toast.className=e?'toast err':'toast';toast.style.display='block';setTimeout(()=>toast.style.display='none',2800)}function scrollLogin(){loginBox.scrollIntoView({behavior:'smooth'})}function authUI(){auth.innerHTML=mode==='login'?`<div class=form><input id=le placeholder=البريد><input id=lp type=password placeholder=كلمة_المرور><button class="btn p" onclick=login()>دخول</button><button class=btn onclick="mode='signup';authUI()">حساب جديد</button></div>`:`<div class=form><input id=snm placeholder=الاسم><input id=se placeholder=البريد><input id=sp type=password placeholder=كلمة_المرور><button class="btn p" onclick=signup()>إنشاء حساب باحث</button><button class=btn onclick="mode='login';authUI()">لدي حساب</button></div>`}
async function signup(){let full_name=snm.value.trim(),email=se.value.trim(),password=sp.value;if(!full_name||!email||!password)return msg('أكمل البيانات',1);let {data,error}=await db.auth.signUp({email,password,options:{emailRedirectTo:SITE,data:{full_name,role:'candidate'}}});if(error)return msg(error.message,1);if(data.user)await db.from('users').upsert({id:data.user.id,full_name,email,phone:email,role:'candidate'});msg('تم إرسال رابط التأكيد للبريد')}async function login(){let {data,error}=await db.auth.signInWithPassword({email:le.value.trim(),password:lp.value});if(error)return msg(error.message,1);user=data.user;await load();openApp()}async function loadUser(){let {data:{user:u}}=await db.auth.getUser();user=u;if(!u)return;let r=await db.from('users').select('*').eq('id',u.id).single();me=r.data||{id:u.id,full_name:u.email,email:u.email,role:'candidate'};if(!r.data)await db.from('users').upsert(me)}async function load(){await loadUser();let c=await db.from('categories').select('*').order('id');if(!c.data||!c.data.length){await db.from('categories').insert(fall);c=await db.from('categories').select('*').order('id')}cats=c.data||fall;let [j,s,a,n]=await Promise.all([db.from('jobs').select('*').order('created_at',{ascending:false}),db.from('seekers').select('*').order('created_at',{ascending:false}),db.from('applications').select('*').order('created_at',{ascending:false}),user?db.from('notifications').select('*').eq('user_id',user.id).order('created_at',{ascending:false}):{data:[]}]);jobs=j.data||[];seekers=s.data||[];apps=a.data||[];notifs=n.data||[];mySeeker=seekers.find(x=>x.owner_id===user?.id);render()}
function openApp(){public.style.display='none';app.classList.add('active');welcome.textContent='مرحبًا، '+(me.full_name||'');sub.textContent='نوع الحساب: باحث عن عمل';fillForms();render()}function page(p,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');document.querySelectorAll('.side .btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()}function render(){jobsCount.textContent=jobs.length;appsCount.textContent=apps.filter(a=>a.applicant_user_id===user?.id).length;viewsCount.textContent=mySeeker?.cv_viewed_count||0;notifCount.textContent=notifs.length;let opts='<option value="">كل الأقسام</option>'+cats.map(c=>`<option>${c.name}</option>`).join('');jobCat.innerHTML=opts;sCat.innerHTML=cats.map(c=>`<option>${c.name}</option>`).join('');latestJobs.innerHTML=jobs.slice(0,6).map(jobCard).join('')||'<p>لا توجد وظائف</p>';renderJobs();renderProfile();renderApps();renderNotifs()}
function renderJobs(){let q=(jobSearch?.value||'').toLowerCase(),city=(jobCity?.value||'').toLowerCase(),cat=jobCat?.value||'';let d=jobs.filter(j=>(!q||String(j.title).toLowerCase().includes(q)||String(j.company_name).toLowerCase().includes(q))&&(!city||String(j.city).toLowerCase().includes(city))&&(!cat||j.category===cat));jobsGrid.innerHTML=d.map(jobCard).join('')||'<p>لا توجد نتائج</p>'}function jobCard(j){return `<div class="item glass"><h3>${j.title||''}</h3><p>${j.company_name||''}</p><div class=meta><span>${j.city||''}</span><span>${j.work_type||''}</span><span>${j.category||''}</span></div><p>${j.description||''}</p><span class=pill>${j.applicants_count||0} متقدم</span><button class="btn p" onclick="applyJob(${j.id})">تقديم</button></div>`}
async function applyJob(id){let j=jobs.find(x=>x.id===id);if(!j)return;let r=await db.from('applications').insert({job_id:id,applicant_user_id:user.id,applicant_name:me.full_name,job_title:j.title,company_name:j.company_name,status:'pending'});if(r.error)return msg(r.error.message,1);await db.from('jobs').update({applicants_count:(j.applicants_count||0)+1}).eq('id',id);await db.from('notifications').insert({user_id:user.id,title:'تم التقديم',details:'تم إرسال طلبك على '+j.title});await load();msg('تم التقديم')}
function renderProfile(){publicProfile.innerHTML=mySeeker?`<div class="item glass"><h2>${mySeeker.full_name}</h2><p>${mySeeker.title} • ${mySeeker.city}</p><div>${(mySeeker.skills||[]).map(x=>`<span class=tag>${x}</span>`).join('')}</div><p>${mySeeker.bio||''}</p><span class=pill>${mySeeker.work_preference||''}</span><span class=pill>${mySeeker.last_seen||''}</span></div>`:'<p>لم تنشر ملفك بعد</p>'}function renderApps(){let d=apps.filter(a=>a.applicant_user_id===user?.id);myApps.innerHTML=d.map(a=>`<div class="item glass"><h3>${a.job_title}</h3><p>${a.company_name}</p><span class="pill ${a.status}">${a.status}</span></div>`).join('')||'<p>لا توجد طلبات</p>'}function renderNotifs(){notifyList.innerHTML=notifs.map(n=>`<div class="item glass"><h3>${n.title}</h3><p>${n.details}</p></div>`).join('')||'<p>لا توجد إشعارات</p>'}function fillForms(){uName.value=me.full_name||'';uEmail.value=me.email||me.phone||'';uMobile.value=me.mobile||'';if(mySeeker){sName.value=mySeeker.full_name||'';sTitle.value=mySeeker.title||'';sCity.value=mySeeker.city||'';sExp.value=mySeeker.experience||'';sSkills.value=(mySeeker.skills||[]).join(', ');sBio.value=mySeeker.bio||'';sPortfolio.value=(mySeeker.portfolio_items||[]).join('\n')}}
async function saveSeeker(){let p={owner_id:user.id,full_name:sName.value||me.full_name,title:sTitle.value,city:sCity.value,category:sCat.value,experience:sExp.value,skills:sSkills.value.split(',').map(x=>x.trim()).filter(Boolean),bio:sBio.value,portfolio_items:sPortfolio.value.split('\n').filter(Boolean),work_preference:'دوام كامل',last_seen:'متاح الآن',is_available:true};let r=mySeeker?await db.from('seekers').update(p).eq('id',mySeeker.id):await db.from('seekers').insert(p);if(r.error)return msg(r.error.message,1);await load();msg('تم حفظ منشورك')}async function saveUser(){let r=await db.from('users').update({full_name:uName.value,mobile:uMobile.value,email:uEmail.value}).eq('id',user.id);if(r.error)return msg(r.error.message,1);await load();msg('تم حفظ البيانات')}async function logout(){await db.auth.signOut();location.reload()}window.addEventListener('load',async()=>{authUI();await load();if(user)openApp()});
</script></body></html>
